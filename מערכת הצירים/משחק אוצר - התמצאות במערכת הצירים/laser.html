<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבוך הלייזר - זיהוי זוויות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            overflow-x: hidden;
        }

        #game-container {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            border: 2px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background-color: #1e293b;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
        }

        .btn-option {
            transition: all 0.2s;
        }
        
        .btn-option:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }

        .btn-option:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* הסתרת החצים של שדה המספרים */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .correct-pulse {
            animation: pulseGreen 1s;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- כותרת המשחק -->
    <header class="text-center mb-6">
        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-l from-green-400 to-blue-500 mb-2">
            מבוך הלייזר - משימה <span id="level-display">1</span>
        </h1>
        <p class="text-slate-400 text-lg">כוון את המראות באמצעות בחירת הזווית הנכונה כדי לפתוח את הדלת!</p>
    </header>

    <!-- אזור המשחק המרכזי -->
    <main class="w-full max-w-6xl flex flex-col lg:flex-row gap-6">
        
        <!-- קנבס השרטוט -->
        <div id="game-container" class="flex-grow w-full lg:w-2/3 aspect-[4/3]">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <!-- מסך סיום -->
            <div id="end-screen" class="absolute inset-0 bg-slate-900/90 hidden flex-col items-center justify-center text-center p-6 backdrop-blur-sm z-10">
                <h2 id="end-title" class="text-5xl font-bold text-green-400 mb-4">כל הכבוד! 🎯</h2>
                <p id="end-desc" class="text-xl text-white mb-8">הצלחת לכוון את כל המראות ולפתוח את הדלת בהצלחה.</p>
                <button id="next-level-btn" onclick="nextLevel()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-xl transition-colors mb-4">
                    עבור לשלב הבא
                </button>
                <button id="restart-btn" onclick="location.reload()" class="hidden px-8 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg text-xl transition-colors">
                    שחק שוב מהתחלה
                </button>
            </div>
        </div>

        <!-- פאנל השאלות והשליטה -->
        <aside class="w-full lg:w-1/3 bg-slate-800 rounded-xl p-6 border border-slate-700 flex flex-col">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-700">
                <h2 class="text-2xl font-bold text-blue-400">מרכז הבקרה</h2>
                <div class="bg-slate-900 px-4 py-1 rounded-full text-green-400 font-mono font-bold text-lg">
                    שלב <span id="stage-counter">1</span>/<span id="total-stages">6</span>
                </div>
            </div>

            <div id="question-area" class="flex-grow flex flex-col justify-center">
                <h3 id="question-text" class="text-xl md:text-2xl font-semibold mb-8 text-center leading-relaxed">
                    טוען נתונים...
                </h3>

                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- הכפתורים או שדה ההזנה יוזרקו לכאן דרך ה-JS -->
                </div>
                
                <p id="feedback-msg" class="text-center mt-6 text-lg font-bold min-h-[28px] opacity-0 transition-opacity"></p>
            </div>
        </aside>

    </main>

    <script>
        // --- הגדרות שמע (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSuccessSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.15); 
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function playErrorSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- מערך השלבים (רמות) ---
        const levels = [

                        midPoints: [{ x: 300, y: 350, lbl: 'F' }],
                        angles: [
                            { p1: {x: 650, y: 500}, p2: {x: 300, y: 350}, text: "100°" },

                    },
                    {

                        midPoints: [{ x: 400, y: 100, lbl: 'G' }],
                        angles: [
                            { p1: {x: 400, y: 500}, p2: {x: 400, y: 100}, text: "80°" },
                            { p1: {x: 400, y: 100}, p2: {x: 750, y: 100}, text: "40°" }
                        ],
                        question: "השלב האחרון! חבר את הזוויות כדי לפתוח את הדלת:",

        // --- משתני מערכת משחק ---
        let currentLevelIdx = 0;
        let currentStageIdx = 0;
        let isAnimating = false;
        let animProgress = 0; // 0 to 1

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- קוד סודי למורה: קפיצה על שלב (Alt + S) ---
        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 's') {
                if(isAnimating) return;
                currentStageIdx = levels[currentLevelIdx].stages.length;
                updateUI();
                playSuccessSound();
                setTimeout(playSuccessSound, 200);
            }
        });

        // --- פונקציות ציור עזר ---
        function drawGrid() {
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for(let i = 0; i <= 800; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 600); ctx.stroke();
            }
            for(let j = 0; j <= 600; j += 50) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(800, j); ctx.stroke();
            }
        }

        function drawPoint(x, y, label, color = '#38bdf8') {
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (label) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Heebo';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, x + 20, y - 15);
            }
        }

        function drawLaser(x1, y1, x2, y2, color = '#10b981', isDashed = false, isMoving = false) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            
            if (isDashed) {
                ctx.setLineDash([10, 10]);
            } else if (isMoving) {
                ctx.setLineDash([20, 10]);
                ctx.lineDashOffset = -(performance.now() / 30);
            } else {
                ctx.setLineDash([]);
            }
            
            ctx.stroke();
            ctx.shadowBlur = 0; 
            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;
        }

        function drawHighlightedAngle(cx, cy, p1, p2) {
            let a1 = Math.atan2(p1.y - cy, p1.x - cx);
            let a2 = Math.atan2(p2.y - cy, p2.x - cx);
            
            if (a1 < 0) a1 += 2*Math.PI;
            if (a2 < 0) a2 += 2*Math.PI;

            let diff = a2 - a1;
            if (diff > Math.PI) diff -= 2*Math.PI;
            else if (diff < -Math.PI) diff += 2*Math.PI;

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            
            if (diff > 0) {
                ctx.arc(cx, cy, 50, a1, a1 + diff, false);
            } else {
                ctx.arc(cx, cy, 50, a1, a1 + diff, true);
            }
            ctx.closePath();
            
            ctx.fillStyle = 'rgba(253, 224, 71, 0.4)'; 
            ctx.fill();
            ctx.strokeStyle = '#eab308';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawAngleArc(cx, cy, p1, p2, label, color = '#fcd34d') {
            let a1 = Math.atan2(p1.y - cy, p1.x - cx);
            let a2 = Math.atan2(p2.y - cy, p2.x - cx);
            
            if (a1 < 0) a1 += 2*Math.PI;
            if (a2 < 0) a2 += 2*Math.PI;

            let diff = a2 - a1;
            if (diff > Math.PI) diff -= 2*Math.PI;
            else if (diff < -Math.PI) diff += 2*Math.PI;

            ctx.beginPath();
            if (diff > 0) {
                ctx.arc(cx, cy, 65, a1, a1 + diff, false); 
            } else {
                ctx.arc(cx, cy, 65, a1, a1 + diff, true);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();

            let midAngle = a1 + diff / 2;
            let txtX = cx + Math.cos(midAngle) * 85;
            let txtY = cy + Math.sin(midAngle) * 85;

            ctx.fillStyle = color;
            ctx.font = 'bold 22px Heebo';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, txtX, txtY);
        }

        function drawMirror(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4); 
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#60a5fa';
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(-20, -4, 40, 8);
            
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(-18, -2, 36, 4);
            
            ctx.restore();
        }

        function drawDoor() {
            const doorPos = levels[currentLevelIdx].doorPos;
            const stagesLen = levels[currentLevelIdx].stages.length;

            ctx.fillStyle = '#475569';
            ctx.fillRect(doorPos.x - 10, doorPos.y - 30, 20, 60);
            ctx.fillStyle = currentStageIdx >= stagesLen ? '#10b981' : '#ef4444'; 
            ctx.fillRect(doorPos.x - 5, doorPos.y - 10, 10, 20);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Heebo';
            ctx.fillText('דלת', doorPos.x, doorPos.y - 40);
        }

        function renderScene() {
            const lvl = levels[currentLevelIdx];
            const stages = lvl.stages;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            drawPoint(lvl.startPos.x, lvl.startPos.y, 'התחלה', '#fbbf24');
            drawDoor();

            // מראות קודמות
            for (let i = 0; i < currentStageIdx; i++) {
                const s = stages[i];
                drawLaser(s.prev.x, s.prev.y, s.mirror.x, s.mirror.y, '#10b981', false, true);
                drawMirror(s.mirror.x, s.mirror.y);
            }

            if (currentStageIdx < stages.length) {
                const current = stages[currentStageIdx];
                
                // הלייזר המגיע
                drawLaser(current.prev.x, current.prev.y, current.mirror.x, current.mirror.y, '#10b981', false, true);
                
                if (isAnimating) {
                    drawMirror(current.mirror.x, current.mirror.y);
                    const curX = current.mirror.x + (current.target.x - current.mirror.x) * animProgress;
                    const curY = current.mirror.y + (current.target.y - current.mirror.y) * animProgress;
                    drawLaser(current.mirror.x, current.mirror.y, curX, curY, '#10b981', false, true);
                } 
                else {
                    drawMirror(current.mirror.x, current.mirror.y);
                    
                    if (current.type === 'input') {
                        // מצב ציור לרמה 3 (חיבור זוויות)
                        ctx.setLineDash([8, 8]);
                        ctx.strokeStyle = '#64748b';
                        ctx.lineWidth = 2;
                        
                        // קו מקווקו למטרה הסופית
                        ctx.beginPath();
                        ctx.moveTo(current.mirror.x, current.mirror.y);
                        ctx.lineTo(current.target.x, current.target.y);
                        ctx.stroke();

                        // קו מקווקו לנקודת האמצע (המחלקת את הזווית)
                        current.midPoints.forEach(mp => {
                            ctx.beginPath();
                            ctx.moveTo(current.mirror.x, current.mirror.y);
                            ctx.lineTo(mp.x, mp.y);
                            ctx.stroke();
                        });
                        ctx.setLineDash([]);

                        // הדגשת הזווית המלאה (היעד)
                        drawHighlightedAngle(current.mirror.x, current.mirror.y, current.prev, current.target);

                        // ציור קשתות המשנה עם הטקסטים שלהן
                        current.angles.forEach((ang, idx) => {
                            const color = idx === 0 ? '#fcd34d' : '#f472b6'; // צבע צהוב ואז ורוד
                            drawAngleArc(current.mirror.x, current.mirror.y, ang.p1, ang.p2, ang.text, color);
                        });

                        // ציור הנקודות
                        drawPoint(current.prev.x, current.prev.y, current.prev.lbl);
                        drawPoint(current.mirror.x, current.mirror.y, current.mirror.lbl);
                        drawPoint(current.target.x, current.target.y, current.target.lbl, '#38bdf8');
                        current.midPoints.forEach(mp => {
                            drawPoint(mp.x, mp.y, mp.lbl, '#94a3b8');
                        });

                    } else {
                        // מצב ציור לרמות 1 ו-2
                        const allOptions = [current.target, ...(current.distractors || [])];
                        
                        ctx.setLineDash([8, 8]);
                        ctx.strokeStyle = '#64748b';
                        ctx.lineWidth = 2;
                        allOptions.forEach(opt => {
                            ctx.beginPath();
                            ctx.moveTo(current.mirror.x, current.mirror.y);
                            ctx.lineTo(opt.x, opt.y);
                            ctx.stroke();
                        });
                        ctx.setLineDash([]);
                        
                        drawHighlightedAngle(current.mirror.x, current.mirror.y, current.prev, current.target);

                        drawPoint(current.prev.x, current.prev.y, current.prev.lbl);
                        drawPoint(current.mirror.x, current.mirror.y, current.mirror.lbl);
                        allOptions.forEach(opt => {
                            drawPoint(opt.x, opt.y, opt.lbl, '#38bdf8');
                        });

                        if (current.type === 'alpha') {
                            current.alphaSetup.forEach(alpha => {
                                drawAngleArc(current.mirror.x, current.mirror.y, alpha.p1, alpha.p2, alpha.label, '#cbd5e1');
                            });
                        }
                    }
                }
            } else {
                const lastStage = stages[stages.length - 1];
                drawLaser(lastStage.prev.x, lastStage.prev.y, lastStage.mirror.x, lastStage.mirror.y, '#10b981', false, true);
                drawLaser(lastStage.mirror.x, lastStage.mirror.y, lvl.doorPos.x, lvl.doorPos.y, '#10b981', false, true);
                drawMirror(lastStage.mirror.x, lastStage.mirror.y);
            }
        }

        function updateUI() {
            const stages = levels[currentLevelIdx].stages;
            document.getElementById('level-display').innerText = currentLevelIdx + 1;
            document.getElementById('total-stages').innerText = stages.length;

            if (currentStageIdx >= stages.length) {
                document.getElementById('end-screen').style.display = 'flex';
                
                if (currentLevelIdx < levels.length - 1) {
                    document.getElementById('end-title').innerText = "מעולה! 🎯";
                    document.getElementById('end-desc').innerText = "סיימת את השלב בהצלחה. מוכן לאתגר הבא?";
                    document.getElementById('next-level-btn').style.display = 'inline-block';
                    document.getElementById('restart-btn').style.display = 'none';
                } else {
                    document.getElementById('end-title').innerText = "ניצחון! 🏆";
                    document.getElementById('end-desc').innerText = "הצלחת לכוון את כל המראות ולפתוח את כל הדלתות במשחק.";
                    document.getElementById('next-level-btn').style.display = 'none';
                    document.getElementById('restart-btn').style.display = 'inline-block';
                }
                return;
            }

            const current = stages[currentStageIdx];
            document.getElementById('stage-counter').innerText = currentStageIdx + 1;
            document.getElementById('question-text').innerText = current.question;
            
            const optionsGrid = document.getElementById('options-grid');
            
            if (current.type === 'input') {
                // תצוגת הקלדה לרמה 3
                optionsGrid.className = "flex justify-center mt-4 w-full";
                optionsGrid.innerHTML = `
                    <div class="flex items-center space-x-4 space-x-reverse w-full max-w-sm">
                        <input type="number" id="angle-input" placeholder="הכנס סכום מעלות..." 
                               class="flex-grow bg-slate-700 text-white border-2 border-slate-600 rounded-lg py-3 px-4 text-2xl font-bold focus:outline-none focus:border-blue-500 text-center" dir="ltr">
                        <button id="submit-angle-btn" class="btn-option bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg py-3 px-8 text-xl transition-colors whitespace-nowrap">
                            שגר
                        </button>
                    </div>
                `;
                
                const submitBtn = document.getElementById('submit-angle-btn');
                const angleInput = document.getElementById('angle-input');
                
                submitBtn.onclick = function() {
                    const val = parseInt(angleInput.value);
                    if (!isNaN(val)) {
                        handleAnswer(val, this);
                    }
                };
                
                angleInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') submitBtn.click();
                });
                
                // פוקוס אוטומטי לנוחות התלמידים
                setTimeout(() => angleInput.focus(), 100);

            } else {
                // תצוגת כפתורים רגילה לרמות 1 ו-2
                optionsGrid.className = "grid grid-cols-1 md:grid-cols-2 gap-4";
                optionsGrid.innerHTML = '';
                current.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option bg-slate-700 hover:bg-slate-600 text-white border border-slate-600 rounded-lg py-4 text-xl font-bold transition-colors';
                    btn.dir = "ltr"; 
                    btn.innerText = opt;
                    btn.onclick = () => handleAnswer(idx, btn);
                    optionsGrid.appendChild(btn);
                });
            }

            document.getElementById('feedback-msg').style.opacity = '0';
        }

        function nextLevel() {
            currentLevelIdx++;
            currentStageIdx = 0;
            document.getElementById('end-screen').style.display = 'none';
            updateUI();
        }

        function handleAnswer(selectedValue, btnElement) {
            if (isAnimating) return; 
            
            const current = levels[currentLevelIdx].stages[currentStageIdx];
            const feedbackMsg = document.getElementById('feedback-msg');

            let isCorrect = false;
            if (current.type === 'input') {
                isCorrect = (selectedValue === current.correctAnswer);
            } else {
                isCorrect = (selectedValue === current.correctIdx);
            }

            if (isCorrect) {
                playSuccessSound();
                btnElement.classList.replace('bg-slate-700', 'bg-green-600');
                btnElement.classList.replace('bg-blue-600', 'bg-green-600'); // עבור הכפתור הכחול של שלב 3
                btnElement.classList.replace('hover:bg-slate-600', 'hover:bg-green-500');
                btnElement.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                
                feedbackMsg.innerText = "מצוין! הלייזר תוקן.";
                feedbackMsg.className = "text-center mt-6 text-lg font-bold min-h-[28px] text-green-400";
                feedbackMsg.style.opacity = '1';

                isAnimating = true;
                animProgress = 0;
                
                document.querySelectorAll('.btn-option, input').forEach(b => b.disabled = true);
            } else {
                playErrorSound();
                btnElement.classList.add('bg-red-600');
                btnElement.classList.remove('bg-slate-700', 'hover:bg-slate-600', 'bg-blue-600', 'hover:bg-blue-500');
                
                feedbackMsg.innerText = "טעות, נסה לחשב שוב!";
                feedbackMsg.className = "text-center mt-6 text-lg font-bold min-h-[28px] text-red-400";
                feedbackMsg.style.opacity = '1';
                
                setTimeout(() => {
                    btnElement.classList.remove('bg-red-600');
                    if(current.type === 'input') {
                        btnElement.classList.add('bg-blue-600', 'hover:bg-blue-500');
                    } else {
                        btnElement.classList.add('bg-slate-700', 'hover:bg-slate-600');
                    }
                    feedbackMsg.style.opacity = '0';
                }, 1500);
            }
        }

        function gameLoop() {
            if (isAnimating) {
                animProgress += 0.05; 
                
                if (animProgress >= 1) {
                    isAnimating = false;
                    currentStageIdx++;
                    updateUI();
                    
                    if (currentStageIdx >= levels[currentLevelIdx].stages.length) {
                        playSuccessSound(); 
                        setTimeout(playSuccessSound, 200);
                    }
                }
            }
            
            renderScene();
            requestAnimationFrame(gameLoop);
        }

        window.onload = () => {
            updateUI();
            requestAnimationFrame(gameLoop); 
        };

    </script>
</body>
</html>
