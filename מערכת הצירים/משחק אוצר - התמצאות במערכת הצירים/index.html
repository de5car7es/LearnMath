<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>משחק אוצר - מערכת הצירים</title>
  <style>
    :root {
      --bg1: #f4efe1;
      --bg2: #e7d7b1;
      --ink: #2f2a1f;
      --panel: #fff8e6;
      --accent: #0d6b6b;
      --accent2: #f0a500;
      --danger: #b23a48;
      --ok: #177245;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Rubik", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, #fff5d7 0%, transparent 35%),
        radial-gradient(circle at 80% 85%, #ffe7b0 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
    }
    .app {
      width: min(1100px, 98vw);
      background: #fffcf2cc;
      border: 2px solid #ad8f55;
      border-radius: 16px;
      box-shadow: 0 14px 30px #0000001a;
      overflow: hidden;
      position: relative;
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: linear-gradient(to left, #f7e7bb, #efdbad);
      border-bottom: 2px solid #b89a60;
    }
    .title {
      font-weight: 800;
      font-size: 1.1rem;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary { background: #5e5644; }
    button.warn { background: var(--danger); }
    button.next { background: var(--ok); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 10px;
      padding: 10px;
    }
    .boardWrap {
      position: relative;
      min-height: 620px;
      border: 2px solid #a17f43;
      border-radius: 12px;
      background: #f9efd1;
      overflow: hidden;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .hoverXY {
      position: absolute;
      left: 10px;
      top: 10px;
      background: #fffc;
      border: 1px solid #7f7350;
      border-radius: 8px;
      padding: 4px 8px;
      font-weight: 700;
      pointer-events: none;
    }
    .side {
      background: var(--panel);
      border: 2px solid #a98a54;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card {
      border: 1px solid #ccb584;
      border-radius: 10px;
      background: #fff8e8;
      padding: 8px;
    }
    .status {
      font-weight: 700;
      min-height: 42px;
    }
    .hint {
      line-height: 1.45;
      min-height: 86px;
    }
    .orderedPair {
      direction: ltr;
      unicode-bidi: isolate;
      display: inline-block;
      font-weight: 800;
    }
    .error {
      color: var(--danger);
      font-weight: 800;
      min-height: 24px;
    }
    .helpArea {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: #0007;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
      text-align: center;
      padding: 16px;
    }
    .overlay.show { display: flex; }
    .overlayCard {
      background: #fffef3;
      border: 3px solid #b6985b;
      border-radius: 14px;
      padding: 18px;
      max-width: 680px;
      width: 100%;
    }
    .overlayTitle {
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      font-weight: 900;
      color: #7c5b1f;
      margin-bottom: 8px;
    }
    #confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 5;
    }
    .piece {
      position: absolute;
      width: 10px;
      height: 14px;
      opacity: .92;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0); }
      100% { transform: translateY(760px) rotate(720deg); }
    }
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .boardWrap { min-height: 520px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">משחק אוצר: התמצאות במערכת הקרטזית</div>
      <div class="controls">
        <button id="toggleGridBtn" class="secondary">הסתר רשת</button>
        <label style="display:flex;align-items:center;gap:6px;background:#fff7dd;padding:6px 10px;border-radius:10px;border:1px solid #b89a60;font-weight:700;">
          <input type="checkbox" id="toggleDecorChk" />
          הצג איורי רקע
        </label>
        <button id="restartBtn" class="warn">התחל מהתחלה</button>
      </div>
    </div>

    <div class="main">
      <div class="boardWrap" id="boardWrap">
        <canvas id="gameCanvas" width="780" height="620"></canvas>
        <div class="hoverXY" id="hoverXY">X: 0 , Y: 0</div>
        <div class="overlay" id="winOverlay">
          <div class="overlayCard">
            <div class="overlayTitle" id="winTitle">כל הכבוד! מצאת את האוצר!</div>
            <div id="winText"></div>
            <div style="margin-top:12px">
              <button id="nextStageBtn" class="next">לשלב הבא!</button>
            </div>
          </div>
        </div>
        <div id="confetti"></div>
      </div>

      <aside class="side">
        <div class="card status" id="stageStatus"></div>
        <div class="card">
          <strong>המשימה הנוכחית:</strong>
          <div class="hint" id="hintText"></div>
        </div>
        <div class="card">
          <strong>הודעה:</strong>
          <div class="error" id="errorText"></div>
          <div class="helpArea" id="helpArea"></div>
        </div>
        <div class="card">
          <strong>הסבר:</strong>
          <div>
            לחצו על הנקודה המתאימה במפה לפי <b>(X,Y)</b>.
            לאחר 3 טעויות אפשר לקבל עזרה.
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const CONFIG = {
      stepsPerStage: 6, // מינימום 4
      minSteps: 4,
      maxAbsX: 8,
      maxAbsY: 8,
      cellSize: 34
    };
    if (CONFIG.stepsPerStage < CONFIG.minSteps) CONFIG.stepsPerStage = CONFIG.minSteps;

    const STAGES = [
      { name: "שלב 1", desc: "X חיובי, Y חיובי", x: [0, 8], y: [0, 8], must: { negX: false, negY: false } },
      { name: "שלב 2", desc: "X חיובי ושלילי, Y חיובי", x: [-8, 8], y: [0, 8], must: { negX: true, negY: false } },
      { name: "שלב 3", desc: "X חיובי, Y חיובי ושלילי", x: [0, 8], y: [-8, 8], must: { negX: false, negY: true } },
      { name: "שלב 4", desc: "X חיובי ושלילי, Y חיובי ושלילי", x: [-8, 8], y: [-8, 8], must: { negX: true, negY: true, quadrants: true } }
    ];
    const STAGE_SECRET_ENCRYPTED = [
      [1501, 1492, 1494, 1492],
      [1503, 1514, 1493],
      [1493, 1498, 1515, 1493],
      [1509, 1506, 1497, 1493]
    ];

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const hoverXY = document.getElementById("hoverXY");
    const stageStatus = document.getElementById("stageStatus");
    const hintText = document.getElementById("hintText");
    const errorText = document.getElementById("errorText");
    const helpArea = document.getElementById("helpArea");
    const toggleGridBtn = document.getElementById("toggleGridBtn");
    const toggleDecorChk = document.getElementById("toggleDecorChk");
    const restartBtn = document.getElementById("restartBtn");
    const winOverlay = document.getElementById("winOverlay");
    const winText = document.getElementById("winText");
    const winTitle = document.getElementById("winTitle");
    const nextStageBtn = document.getElementById("nextStageBtn");
    const confettiHost = document.getElementById("confetti");

    const state = {
      stageIndex: 0,
      sequence: [],
      stepIndex: 0,
      trail: [],
      helpUsedCurrentStep: false,
      lastAnswerUsedHelp: false,
      wrongCount: 0,
      showGrid: true,
      showDecor: false,
      showHelpPoint: null,
      pointer: { x: 0, y: 0 },
      player: { x: 0, y: 0 },
      animating: false
    };
    const DECOR_SVGS = {
      tree: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="42" y="60" width="16" height="30" rx="2" fill="#8B4513" stroke="#4A2710" stroke-width="3"/><circle cx="50" cy="40" r="25" fill="#228B22" stroke="#104A10" stroke-width="3"/><circle cx="35" cy="55" r="15" fill="#228B22" stroke="#104A10" stroke-width="3"/><circle cx="65" cy="55" r="15" fill="#228B22" stroke="#104A10" stroke-width="3"/></svg>`,
      mountain: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,15 90,85 10,85" fill="#92A8D1" stroke="#4A5568" stroke-width="3"/><polygon points="50,15 65,41 55,35 50,45 45,35 35,41" fill="white" stroke="#4A5568" stroke-width="3" stroke-linejoin="round"/></svg>`,
      cave: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M10,85 C10,30 90,30 90,85 Z" fill="#A0A0A0" stroke="#505050" stroke-width="3"/><path d="M30,85 C30,50 70,50 70,85 Z" fill="#202020" stroke="#000000" stroke-width="3"/></svg>`,
      bridge: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="70" width="100" height="30" fill="#81D4FA"/><path d="M0,70 L0,50 C20,30 40,30 50,50 C60,30 80,30 100,50 L100,70 L85,70 C85,60 75,55 65,60 L60,70 L40,70 L35,60 C25,55 15,60 15,70 Z" fill="#D7CCC8" stroke="#5D4037" stroke-width="3"/><line x1="0" y1="45" x2="100" y2="45" stroke="#5D4037" stroke-width="3" stroke-dasharray="8 4"/></svg>`,
      lake: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M10,50 C10,20 50,10 80,30 C110,50 90,90 50,90 C20,90 10,70 10,50 Z" fill="#4FC3F7" stroke="#01579B" stroke-width="3"/><path d="M30,55 Q40,50 50,55 M60,65 Q70,60 80,65" stroke="#01579B" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
      compass: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#F5F5F5" stroke="#424242" stroke-width="4"/><line x1="50" y1="15" x2="50" y2="85" stroke="#BDBDBD" stroke-width="2"/><line x1="15" y1="50" x2="85" y2="50" stroke="#BDBDBD" stroke-width="2"/><polygon points="50,15 60,50 50,55 40,50" fill="#EF5350" stroke="#B71C1C" stroke-width="2"/><polygon points="50,85 60,50 50,45 40,50" fill="#9E9E9E" stroke="#424242" stroke-width="2"/><circle cx="50" cy="50" r="4" fill="#424242"/><text x="46" y="12" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B71C1C">N</text></svg>`
    };
    const decorImages = {};
    function initDecorImages() {
      Object.entries(DECOR_SVGS).forEach(([key, svg]) => {
        const img = new Image();
        img.src = "data:image/svg+xml;utf8," + encodeURIComponent(svg);
        img.onload = () => render();
        decorImages[key] = img;
      });
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }
    function formatAxisNumber(n) {
      return n < 0 ? `\u2212${Math.abs(n)}` : String(n);
    }
    function decodeStageSecret(stageIndex) {
      return STAGE_SECRET_ENCRYPTED[stageIndex]
        .map(code => String.fromCharCode(code - 1))
        .join("");
    }

    function samePoint(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    function uniquePush(arr, p) {
      if (!arr.some(v => samePoint(v, p))) arr.push(p);
    }

    function createSequenceForStage(stage, steps) {
      const points = [];
      let guard = 0;
      while (points.length < steps && guard < 10000) {
        guard++;
        const p = { x: randInt(stage.x[0], stage.x[1]), y: randInt(stage.y[0], stage.y[1]) };
        if (p.x === 0 && p.y === 0) continue;
        uniquePush(points, p);
      }

      function forceOne(predicate, candidateFactory) {
        if (points.some(predicate)) return;
        for (let i = 0; i < points.length; i++) {
          const candidate = candidateFactory();
          if (!points.some((p, idx) => idx !== i && samePoint(p, candidate))) {
            points[i] = candidate;
            return;
          }
        }
      }

      if (stage.must.negX) {
        forceOne(p => p.x < 0, () => ({ x: randInt(Math.min(-1, stage.x[0]), -1), y: randInt(stage.y[0], stage.y[1]) }));
      }
      if (stage.must.negY) {
        forceOne(p => p.y < 0, () => ({ x: randInt(stage.x[0], stage.x[1]), y: randInt(Math.min(-1, stage.y[0]), -1) }));
      }
      if (stage.must.quadrants) {
        const quadrants = [
          p => p.x > 0 && p.y > 0,
          p => p.x < 0 && p.y > 0,
          p => p.x < 0 && p.y < 0,
          p => p.x > 0 && p.y < 0
        ];
        const factories = [
          () => ({ x: randInt(1, stage.x[1]), y: randInt(1, stage.y[1]) }),
          () => ({ x: randInt(stage.x[0], -1), y: randInt(1, stage.y[1]) }),
          () => ({ x: randInt(stage.x[0], -1), y: randInt(stage.y[0], -1) }),
          () => ({ x: randInt(1, stage.x[1]), y: randInt(stage.y[0], -1) })
        ];
        quadrants.forEach((test, i) => {
          forceOne(test, factories[i]);
        });
      }

      return points;
    }
    function randomPointForStage(stage, existingPoints) {
      for (let i = 0; i < 5000; i++) {
        const p = { x: randInt(stage.x[0], stage.x[1]), y: randInt(stage.y[0], stage.y[1]) };
        if (p.x === 0 && p.y === 0) continue;
        if (existingPoints.some(ep => samePoint(ep, p))) continue;
        return p;
      }
      return { x: stage.x[0], y: stage.y[0] };
    }

    function getViewportForStage(stage) {
      const margin = 50;
      const w = canvas.width;
      const h = canvas.height;
      const [minX, maxX] = stage.x;
      const [minY, maxY] = stage.y;
      const cellsX = maxX - minX;
      const cellsY = maxY - minY;
      const scaleX = (w - margin * 2) / Math.max(1, cellsX);
      const scaleY = (h - margin * 2) / Math.max(1, cellsY);
      const scale = Math.min(CONFIG.cellSize, scaleX, scaleY);
      const axisX = margin + (-minX) * scale;
      const axisY = h - margin - (-minY) * scale;
      return { minX, maxX, minY, maxY, scale, axisX, axisY, margin };
    }

    function coordToCanvas(x, y, vp) {
      return {
        x: vp.axisX + x * vp.scale,
        y: vp.axisY - y * vp.scale
      };
    }

    function canvasToCoord(px, py, vp) {
      const x = (px - vp.axisX) / vp.scale;
      const y = (vp.axisY - py) / vp.scale;
      return { x, y, rx: Math.round(x), ry: Math.round(y) };
    }

    function drawMap(vp) {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = "#b88c4f";
      for (let i = 0; i < 6; i++) {
        const cx = 120 + i * 120 + (i % 2 ? 20 : -10);
        const cy = 100 + (i % 3) * 140;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 70, 28, (i % 2) * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = "#8e6a33";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(90, 540);
      ctx.bezierCurveTo(260, 420, 310, 560, 470, 430);
      ctx.bezierCurveTo(580, 350, 650, 490, 730, 360);
      ctx.stroke();
      ctx.restore();
      drawDecor(vp);

      const landmarks = [
        { x: vp.minX + 1, y: vp.maxY - 1, t: "הר" },
        { x: Math.floor((vp.minX + vp.maxX) / 2), y: Math.floor((vp.minY + vp.maxY) / 2), t: "עץ" },
        { x: vp.maxX - 1, y: vp.minY + 1, t: "גשר" }
      ];
      ctx.save();
      ctx.fillStyle = "#5d3c17";
      ctx.font = "bold 17px Rubik, sans-serif";
      landmarks.forEach(l => {
        if (l.x < vp.minX || l.x > vp.maxX || l.y < vp.minY || l.y > vp.maxY) return;
        const p = coordToCanvas(l.x, l.y, vp);
        ctx.fillText(l.t, p.x + 8, p.y - 8);
      });
      ctx.restore();
    }
    function drawDecor(vp) {
      const placements = [
        { key: "tree", x: 70, y: 150, w: 85, h: 85 },
        { key: "mountain", x: 600, y: 95, w: 95, h: 95 },
        { key: "cave", x: 180, y: 430, w: 92, h: 92 },
        { key: "bridge", x: 470, y: 430, w: 120, h: 88 },
        { key: "lake", x: 300, y: 220, w: 110, h: 110 },
        { key: "compass", x: canvas.width - 112, y: 12, w: 92, h: 92 }
      ];
      ctx.save();
      ctx.globalAlpha = 0.35;
      placements.forEach(p => {
        if (p.key !== "compass" && !state.showDecor) return;
        const img = decorImages[p.key];
        if (img && img.complete) ctx.drawImage(img, p.x, p.y, p.w, p.h);
      });
      ctx.restore();
    }

    function drawGridAndAxes(vp) {
      if (state.showGrid) {
        ctx.save();
        ctx.strokeStyle = "#6b603f33";
        ctx.lineWidth = 1;
        for (let x = vp.minX; x <= vp.maxX; x++) {
          const p = coordToCanvas(x, 0, vp);
          ctx.beginPath();
          ctx.moveTo(p.x, coordToCanvas(0, vp.minY, vp).y);
          ctx.lineTo(p.x, coordToCanvas(0, vp.maxY, vp).y);
          ctx.stroke();
        }
        for (let y = vp.minY; y <= vp.maxY; y++) {
          const p = coordToCanvas(0, y, vp);
          ctx.beginPath();
          ctx.moveTo(coordToCanvas(vp.minX, 0, vp).x, p.y);
          ctx.lineTo(coordToCanvas(vp.maxX, 0, vp).x, p.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      ctx.save();
      ctx.strokeStyle = "#1f4a7b";
      ctx.lineWidth = 3;
      if (0 >= vp.minY && 0 <= vp.maxY) {
        const y0 = coordToCanvas(0, 0, vp).y;
        ctx.beginPath();
        ctx.moveTo(coordToCanvas(vp.minX, 0, vp).x, y0);
        ctx.lineTo(coordToCanvas(vp.maxX, 0, vp).x, y0);
        ctx.stroke();
      }
      if (0 >= vp.minX && 0 <= vp.maxX) {
        const x0 = coordToCanvas(0, 0, vp).x;
        ctx.beginPath();
        ctx.moveTo(x0, coordToCanvas(0, vp.minY, vp).y);
        ctx.lineTo(x0, coordToCanvas(0, vp.maxY, vp).y);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "#12365c";
      ctx.font = "bold 13px Rubik, sans-serif";
      ctx.direction = "ltr";
      for (let x = vp.minX; x <= vp.maxX; x++) {
        const p = coordToCanvas(x, 0, vp);
        if (0 < vp.minY || 0 > vp.maxY) continue;
        ctx.fillText(formatAxisNumber(x), p.x - 5, p.y + 18);
      }
      for (let y = vp.minY; y <= vp.maxY; y++) {
        const p = coordToCanvas(0, y, vp);
        if (0 < vp.minX || 0 > vp.maxX) continue;
        if (y === 0) continue;
        ctx.fillText(formatAxisNumber(y), p.x + 8, p.y + 4);
      }
      ctx.restore();
    }

    function drawTargetsAndPlayer(vp) {
      const completed = state.sequence.slice(0, state.stepIndex);
      if (state.trail.length > 1) {
        ctx.save();
        ctx.strokeStyle = "#7a5624";
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        const p0 = coordToCanvas(state.trail[0].x, state.trail[0].y, vp);
        ctx.moveTo(p0.x, p0.y);
        for (let i = 1; i < state.trail.length; i++) {
          const p = coordToCanvas(state.trail[i].x, state.trail[i].y, vp);
          ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
      ctx.save();
      completed.forEach((pt, i) => {
        const p = coordToCanvas(pt.x, pt.y, vp);
        ctx.fillStyle = i === completed.length - 1 ? "#f2a50b" : "#8aa36f";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();

      if (state.showHelpPoint) {
        const hp = coordToCanvas(state.showHelpPoint.x, state.showHelpPoint.y, vp);
        ctx.save();
        ctx.strokeStyle = "#b23a48";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(hp.x, hp.y, 13, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "#b23a48";
        ctx.font = "bold 14px Rubik, sans-serif";
        ctx.fillText("עזרה", hp.x + 12, hp.y - 12);
        ctx.restore();
      }

      const pl = coordToCanvas(state.player.x, state.player.y, vp);
      ctx.save();
      ctx.fillStyle = "#14395f";
      ctx.beginPath();
      ctx.arc(pl.x, pl.y - 12, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#274f2d";
      ctx.fillRect(pl.x - 7, pl.y - 4, 14, 16);
      ctx.fillStyle = "#1f5f2b";
      ctx.fillRect(pl.x - 4, pl.y + 10, 3, 8);
      ctx.fillRect(pl.x + 1, pl.y + 10, 3, 8);
      ctx.restore();
    }

    function stageAndStepText() {
      const s = STAGES[state.stageIndex];
      const currentTarget = state.sequence[state.stepIndex];
      stageStatus.innerHTML =
        `<div>${s.name} מתוך 4</div>
         <div>${s.desc}</div>
         <div>צעד ${state.stepIndex + 1} מתוך ${state.sequence.length}</div>`;

      const isLast = state.stepIndex === state.sequence.length - 1;
      const extra = isLast ? "זה הצעד האחרון - כאן מחכה האוצר!" : clueToNext(state.player, currentTarget);
      hintText.innerHTML =
        `מצאו את הנקודה: <span class="orderedPair">(${currentTarget.x}, ${currentTarget.y})</span><br>${extra}`;
    }

    function clueToNext(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dirX = dx > 0 ? `ימינה ${dx}` : dx < 0 ? `שמאלה ${Math.abs(dx)}` : "בלי תזוזה על ציר X";
      const dirY = dy > 0 ? `למעלה ${dy}` : dy < 0 ? `למטה ${Math.abs(dy)}` : "בלי תזוזה על ציר Y";
      return `רמז: מהנקודה הנוכחית זוזו ${dirX}, ואז ${dirY}.`;
    }

    function render() {
      const stage = STAGES[state.stageIndex];
      const vp = getViewportForStage(stage);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMap(vp);
      drawGridAndAxes(vp);
      drawTargetsAndPlayer(vp);
    }

    function animatePlayerTo(target, cb) {
      state.animating = true;
      const start = { ...state.player };
      const duration = 700;
      const t0 = performance.now();

      function frame(t) {
        const p = Math.min(1, (t - t0) / duration);
        const ease = 1 - Math.pow(1 - p, 3);
        state.player.x = start.x + (target.x - start.x) * ease;
        state.player.y = start.y + (target.y - start.y) * ease;
        render();
        if (p < 1) requestAnimationFrame(frame);
        else {
          state.player.x = target.x;
          state.player.y = target.y;
          state.animating = false;
          cb && cb();
        }
      }
      requestAnimationFrame(frame);
    }

    function showError(msg) {
      errorText.textContent = msg;
    }

    function clearHelpArea() {
      helpArea.innerHTML = "";
    }

    function offerHelp() {
      clearHelpArea();
      const txt = document.createElement("span");
      txt.textContent = "רוצים עזרה?";
      const btn = document.createElement("button");
      btn.textContent = "הצג עזרה";
      btn.className = "secondary";
      btn.onclick = () => {
        state.showHelpPoint = state.sequence[state.stepIndex];
        state.helpUsedCurrentStep = true;
        render();
        showError("סומן עבורך המיקום המתאים.");
        clearHelpArea();
      };
      helpArea.append(txt, btn);
    }

    function celebrate(stageDone) {
      playWinSound();
      dropConfetti();
      const stageSecret = decodeStageSecret(stageDone);
      winTitle.textContent = "כל הכבוד ! מצאת את האוצר !";
      winText.innerHTML = stageDone < STAGES.length - 1
        ? `סיימת את ${STAGES[stageDone].name}. מילת הסוד שלך: <b>${stageSecret}</b>. מוכנים לשלב הבא?`
        : `סיימת את כל השלבים במשחק! מילת הסוד שלך: <b>${stageSecret}</b>. כעת אפשר למסור למורה את כל 4 המילים.`;
      nextStageBtn.textContent = stageDone < STAGES.length - 1 ? "לשלב הבא!" : "התחל מהתחלה";
      winOverlay.classList.add("show");
    }

    function playWinSound() {
      const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const o = ctxAudio.createOscillator();
        const g = ctxAudio.createGain();
        o.type = "triangle";
        o.frequency.value = freq;
        o.connect(g);
        g.connect(ctxAudio.destination);
        const start = ctxAudio.currentTime + i * 0.14;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.22, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.25);
        o.start(start);
        o.stop(start + 0.26);
      });
    }

    function dropConfetti() {
      confettiHost.innerHTML = "";
      const colors = ["#f94144", "#f3722c", "#f8961e", "#90be6d", "#43aa8b", "#577590"];
      for (let i = 0; i < 120; i++) {
        const d = document.createElement("div");
        d.className = "piece";
        d.style.left = `${Math.random() * 100}%`;
        d.style.background = colors[Math.floor(Math.random() * colors.length)];
        d.style.animationDuration = `${2 + Math.random() * 2.5}s`;
        d.style.animationDelay = `${Math.random() * 0.8}s`;
        confettiHost.appendChild(d);
      }
      setTimeout(() => (confettiHost.innerHTML = ""), 5200);
    }

    function startStage(index) {
      state.stageIndex = index;
      const stage = STAGES[index];
      state.sequence = createSequenceForStage(stage, CONFIG.stepsPerStage);
      state.stepIndex = 0;
      state.wrongCount = 0;
      state.helpUsedCurrentStep = false;
      state.lastAnswerUsedHelp = false;
      state.showHelpPoint = null;
      state.player = { x: 0, y: 0 };
      state.trail = [{ x: 0, y: 0 }];
      state.animating = false;
      showError("");
      clearHelpArea();
      stageAndStepText();
      render();
    }

    function finishStep() {
      state.trail.push({ ...state.player });
      let addedExtra = false;
      if (state.lastAnswerUsedHelp) {
        const stage = STAGES[state.stageIndex];
        const extra = randomPointForStage(stage, state.sequence);
        state.sequence.push(extra);
        addedExtra = true;
        showError("הנקודה נמצאה בעזרת עזרה, נוספה משימה נוספת לשלב זה.");
      }
      state.lastAnswerUsedHelp = false;
      if (state.stepIndex === state.sequence.length - 1) {
        celebrate(state.stageIndex);
        return;
      }
      state.stepIndex++;
      state.wrongCount = 0;
      state.helpUsedCurrentStep = false;
      state.showHelpPoint = null;
      if (!addedExtra) showError("");
      clearHelpArea();
      stageAndStepText();
      render();
    }

    function handleBoardClick(ev) {
      if (state.animating || winOverlay.classList.contains("show")) return;
      const rect = canvas.getBoundingClientRect();
      const x = ev.clientX - rect.left;
      const y = ev.clientY - rect.top;
      const vp = getViewportForStage(STAGES[state.stageIndex]);
      const c = canvasToCoord(x, y, vp);
      const snapX = clamp(c.rx, vp.minX, vp.maxX);
      const snapY = clamp(c.ry, vp.minY, vp.maxY);
      const snappedCanvas = coordToCanvas(snapX, snapY, vp);
      const dist = Math.hypot(snappedCanvas.x - x, snappedCanvas.y - y);
      const clickTolerance = Math.max(16, vp.scale * 0.6);
      if (dist > clickTolerance) {
        showError("לחצו קרוב יותר לצומת של רשת הצירים.");
        return;
      }
      const clickPoint = { x: snapX, y: snapY };
      const target = state.sequence[state.stepIndex];

      if (clickPoint.x === target.x && clickPoint.y === target.y) {
        showError("מעולה! נקודה נכונה.");
        state.lastAnswerUsedHelp = state.helpUsedCurrentStep;
        state.showHelpPoint = null;
        animatePlayerTo(target, finishStep);
      } else {
        state.wrongCount++;
        showError("נסה שנית");
        if (state.wrongCount >= 3) offerHelp();
      }
    }

    function handleMouseMove(ev) {
      const rect = canvas.getBoundingClientRect();
      const x = ev.clientX - rect.left;
      const y = ev.clientY - rect.top;
      const vp = getViewportForStage(STAGES[state.stageIndex]);
      const c = canvasToCoord(x, y, vp);
      const sx = clamp(c.rx, vp.minX, vp.maxX);
      const sy = clamp(c.ry, vp.minY, vp.maxY);
      state.pointer.x = sx;
      state.pointer.y = sy;
      hoverXY.textContent = `X: ${sx} , Y: ${sy}`;
    }

    toggleGridBtn.addEventListener("click", () => {
      state.showGrid = !state.showGrid;
      toggleGridBtn.textContent = state.showGrid ? "הסתר רשת" : "הצג רשת";
      render();
    });
    toggleDecorChk.addEventListener("change", () => {
      state.showDecor = toggleDecorChk.checked;
      render();
    });

    restartBtn.addEventListener("click", () => {
      winOverlay.classList.remove("show");
      startStage(0);
    });

    nextStageBtn.addEventListener("click", () => {
      winOverlay.classList.remove("show");
      if (state.stageIndex < STAGES.length - 1) startStage(state.stageIndex + 1);
      else startStage(0);
    });

    canvas.addEventListener("mousemove", handleMouseMove);
    canvas.addEventListener("click", handleBoardClick);

    window.addEventListener("resize", () => render());
    initDecorImages();
    startStage(0);
  </script>
</body>
</html>
