<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת צירים אינטראקטיבית</title>
    <style>
        :root {
            --bg-color: #04111d;
            --grid-color: rgba(0, 255, 128, 0.3);
            --grid-axis: #00ff80;
            --primary: #00ff80;
            --secondary: #1a365d;
            --panel-bg: rgba(0, 20, 30, 0.9);
            --text-color: #e0e0e0;
            --danger: #ff4444;
            --equation-color: #00bfff; /* תכלת בולט למשוואות */
        }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden;
            user-select: none;
        }
        
        button { 
            padding: 8px 12px; font-size: 16px; border-radius: 4px; border: 2px solid var(--primary); 
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            cursor: pointer; background-color: var(--secondary); color: var(--primary); 
            transition: all 0.2s; box-shadow: 0 0 5px rgba(0,255,128,0.2);
            margin-bottom: 10px; width: 100%; box-sizing: border-box;
        }
        button:hover { background-color: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }
        button.active { background-color: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        #sidebar { 
            width: 330px; background: var(--panel-bg); border-left: 2px solid var(--primary); 
            padding: 15px; display: flex; flex-direction: column; z-index: 10;
            box-sizing: border-box; overflow-y: auto;
        }
        
        #sidebar h2, #sidebar h3 { color: var(--primary); text-align: center; margin-top: 0; }
        
        textarea {
            width: 100%; background: #000; color: var(--primary);
            border: 2px solid var(--primary); border-radius: 4px;
            padding: 8px; font-family: 'Courier New', Courier, monospace;
            font-size: 14px; box-sizing: border-box; resize: vertical; min-height: 60px;
            margin-bottom: 20px; outline: none;
        }

        .textarea-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
        }

        .font-btn {
            background: #000; color: var(--primary); border: 1px solid var(--primary);
            border-radius: 3px; cursor: pointer; padding: 2px 8px; font-weight: bold; font-family: monospace;
            margin: 0 0 0 5px; width: auto; font-size: 14px; box-shadow: none;
        }
        .font-btn:hover { background: var(--primary); color: #000; box-shadow: none; }
        
        .equation-panel {
            margin-top: 10px; border-top: 2px dashed var(--primary); padding-top: 15px; text-align: center;
        }
        .eq-inputs {
            display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap;
            direction: ltr; color: var(--equation-color); font-size: 16px; margin-bottom: 10px; font-weight: bold;
        }
        .eq-inputs input {
            background: #000; color: #fff; border: 1px solid var(--equation-color); 
            border-radius: 4px; text-align: center; font-family: 'Courier New'; font-size: 16px; padding: 4px;
        }
        .eq-inputs input:focus { outline: none; box-shadow: 0 0 5px var(--equation-color); }

        #delete-zone {
            margin-top: auto; padding: 20px; text-align: center;
            border: 2px dashed #555; color: #777; border-radius: 8px;
            transition: all 0.3s;
        }
        #delete-zone.drag-over {
            border-color: var(--danger); color: var(--danger); background: rgba(255,0,0,0.1);
        }

        #canvas-wrapper { 
            flex-grow: 1; position: relative; background: var(--bg-color); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        #view-controls {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 20; background: var(--panel-bg);
            padding: 10px; border-radius: 8px; border: 1px solid var(--primary);
        }
        #view-controls button { margin: 0; width: auto; font-size: 14px; }

        canvas { 
            background: var(--bg-color); 
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0,255,128,0.1);
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>מערכת קרטזית</h2>
        
        <div class="textarea-header">
            <span style="color: #888; font-size: 14px;">הערות לשיעור:</span>
            <div>
                <button class="font-btn" onclick="changeTextareaFont(1)">A+</button>
                <button class="font-btn" onclick="changeTextareaFont(-1)">A-</button>
            </div>
        </div>
        <textarea id="lesson-notes" rows="4" placeholder="טקסט חופשי..."></textarea>
        
        <h3 style="margin-bottom: 10px;">כלי שרטוט</h3>
        <button id="btn-select" class="active" onclick="setMode('select')">👆 בחירה / שוטטות</button>
        <button id="btn-point" onclick="setMode('point')">🔘 נקודה (לחיצה)</button>
        <button id="btn-line" onclick="setMode('line')">➖ קו (2 נקודות)</button>
        <button id="btn-rect" onclick="setMode('rect')">⬜ מלבן (2 נקודות)</button>
        <button id="btn-triangle" onclick="setMode('triangle')">📐 משולש (3 נקודות)</button>
        
        <div style="font-size: 12px; color: #888; text-align: center; line-height: 1.5; margin-bottom: 10px;">
            * במצב "בחירה", לחץ על רקע ריק וגרור כדי לשוטט.<br>
            * גרור גרף של פונקציה כדי להזיז אותו במרחב.
        </div>
        
        <div class="equation-panel">
            <h3 style="color: var(--equation-color); margin-bottom: 10px;">פונקציה ליניארית</h3>
            <div class="eq-inputs">
                <span>y =</span>
                <input type="number" id="input-m" value="1" step="0.5" oninput="onInputsChanged()" style="width: 45px;">
                <span>(x +</span>
                <input type="number" id="input-p" value="0" step="0.5" oninput="onInputsChanged()" style="width: 45px;">
                <span>) +</span>
                <input type="number" id="input-b" value="0" step="0.5" oninput="onInputsChanged()" style="width: 45px;">
            </div>
            <div id="full-equation-display" style="font-size: 18px; font-weight: bold; margin-bottom: 15px; color: var(--equation-color); direction: ltr;">y = x</div>
            <button onclick="addEquation()" style="background-color: #002233; border-color: var(--equation-color); color: var(--equation-color);">📈 הוסף גרף חדש</button>
        </div>
        
        <button onclick="clearAll()" style="background-color: #330000; border-color: var(--danger); color: var(--danger); margin-top: 15px;">🗑️ נקה לוח</button>

        <div id="delete-zone">
            גרור צורה לכאן<br>כדי למחוק אותה
        </div>
    </div>

    <div id="canvas-wrapper">
        <div id="view-controls">
            <button onclick="setView('all')" id="btn-view-all" class="active">כל המערכת</button>
            <button onclick="setView('q3')" id="btn-view-q3">רביעים 1-3</button>
            <button onclick="setView('q2')" id="btn-view-q2">רביעים 1-2</button>
            <button onclick="setView('q1')" id="btn-view-q1">רביע 1</button>
        </div>
        <canvas id="gridCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const sidebar = document.getElementById('sidebar');
        const deleteZone = document.getElementById('delete-zone');

        // State variables
        let currentMode = 'select'; // select, point, line, rect, triangle
        let currentViewMode = 'all'; // all, q1, q2, q3
        let shapes = [];
        let pendingPoints = [];
        let viewBounds = { minX: -20, maxX: 20, minY: -20, maxY: 20 };
        
        // Textarea Font Size State
        let currentTextareaFontSize = 14;

        // Dragging state
        let dragInfo = null;
        let hoverInfo = null;
        let mousePos = { x: 0, y: 0 }; 
        let activeEquation = null;

        // Font Resize function
        function changeTextareaFont(delta) {
            const textarea = document.getElementById('lesson-notes');
            currentTextareaFontSize += delta * 2;
            if (currentTextareaFontSize < 10) currentTextareaFontSize = 10;
            if (currentTextareaFontSize > 36) currentTextareaFontSize = 36;
            textarea.style.fontSize = currentTextareaFontSize + 'px';
        }

        // Viewport settings
        function setView(viewMode) {
            document.querySelectorAll('#view-controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-view-' + viewMode).classList.add('active');

            currentViewMode = viewMode;

            if (viewMode === 'all') viewBounds = { minX: -20, maxX: 20, minY: -20, maxY: 20 };
            else if (viewMode === 'q1') viewBounds = { minX: 0, maxX: 20, minY: 0, maxY: 20 };
            else if (viewMode === 'q2') viewBounds = { minX: -20, maxX: 20, minY: 0, maxY: 20 };
            else if (viewMode === 'q3') viewBounds = { minX: -20, maxX: 20, minY: -20, maxY: 20 };
            
            resizeCanvas();
        }

        function setMode(mode) {
            currentMode = mode;
            pendingPoints = [];
            document.querySelectorAll('#sidebar button[id^="btn-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            render();
        }

        function clearAll() {
            shapes = [];
            pendingPoints = [];
            render();
        }

        function onInputsChanged(updateShape = true) {
            const mVal = parseFloat(document.getElementById('input-m').value);
            const pVal = parseFloat(document.getElementById('input-p').value);
            const bVal = parseFloat(document.getElementById('input-b').value);
            const m = isNaN(mVal) ? 1 : mVal;
            const p = isNaN(pVal) ? 0 : pVal;
            const b = isNaN(bVal) ? 0 : bVal;
            
            document.getElementById('full-equation-display').innerText = formatEquation(m, p, b);
            
            if (updateShape && activeEquation) {
                activeEquation.m = m;
                activeEquation.p = p;
                activeEquation.b = b;
                render();
            }
        }

        function addEquation() {
            const mVal = parseFloat(document.getElementById('input-m').value);
            const pVal = parseFloat(document.getElementById('input-p').value);
            const bVal = parseFloat(document.getElementById('input-b').value);
            const m = isNaN(mVal) ? 1 : mVal;
            const p = isNaN(pVal) ? 0 : pVal;
            const b = isNaN(bVal) ? 0 : bVal;
            
            const newEq = { type: 'equation', m: m, p: p, b: b, id: Date.now() };
            shapes.push(newEq);
            activeEquation = newEq;
            setMode('select');
            render();
        }

        function formatEquation(m, p, b) {
            m = Math.round(m * 100) / 100;
            p = Math.round(p * 100) / 100;
            b = Math.round(b * 100) / 100;

            if (m === 0) return `y = ${b}`;
            
            let mStr = m === 1 ? '' : (m === -1 ? '-' : `${m}`);
            
            let xPart = '';
            if (p === 0) {
                xPart = `x`;
            } else if (p > 0) {
                xPart = `(x + ${p})`;
            } else {
                xPart = `(x - ${Math.abs(p)})`;
            }

            let eq = `y = ${mStr}${xPart}`;

            if (b > 0) eq += ` + ${b}`;
            else if (b < 0) eq += ` - ${Math.abs(b)}`;
            
            if (eq === 'y = ') eq = 'y = x';
            if (eq === 'y = -') eq = 'y = -x';

            return eq;
        }

        // Setup Canvas
        function resizeCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const size = Math.min(wrapper.clientWidth - 40, wrapper.clientHeight - 80);
            canvas.width = size;
            canvas.height = size;
            render();
        }
        window.addEventListener('resize', resizeCanvas);

        // Coordinate Conversions
        function getCellSize() {
            const cols = viewBounds.maxX - viewBounds.minX;
            return canvas.width / cols;
        }

        function pxToGridExact(px, py) {
            const cellSize = getCellSize();
            return {
                x: viewBounds.minX + (px / cellSize),
                y: viewBounds.maxY - (py / cellSize)
            };
        }

        function gridToPx(gx, gy) {
            const cellSize = getCellSize();
            const x = (gx - viewBounds.minX) * cellSize;
            const y = (viewBounds.maxY - gy) * cellSize;
            return { x, y };
        }

        function pxToGrid(px, py) {
            const exact = pxToGridExact(px, py);
            return { x: Math.round(exact.x), y: Math.round(exact.y) };
        }

        // Drawing Functions
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cellSize = getCellSize();
            
            ctx.direction = 'ltr';
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';

            // Draw grid lines
            const minXInt = Math.floor(viewBounds.minX);
            const maxXInt = Math.ceil(viewBounds.maxX);
            for (let x = minXInt; x <= maxXInt; x++) {
                const px = gridToPx(x, 0).x;
                ctx.lineWidth = (x === 0) ? 2 : 0.5;
                ctx.strokeStyle = (x === 0) ? '#00ff80' : 'rgba(0, 255, 128, 0.3)';
                
                let startY = 0;
                let endY = canvas.height;
                
                if (currentViewMode === 'q3' && x > 0) endY = gridToPx(0, 0).y;

                ctx.beginPath(); ctx.moveTo(px, startY); ctx.lineTo(px, endY); ctx.stroke();
                
                if (x !== 0) {
                    ctx.fillStyle = '#aaa'; ctx.font = '12px Courier New';
                    const yPos = Math.max(0, Math.min(canvas.height, gridToPx(0, 0).y));
                    let textY = yPos + 15;
                    if (yPos >= canvas.height - 20) textY = yPos - 12;
                    ctx.fillText(x.toString(), px, textY);
                }
            }

            const minYInt = Math.floor(viewBounds.minY);
            const maxYInt = Math.ceil(viewBounds.maxY);
            for (let y = minYInt; y <= maxYInt; y++) {
                const py = gridToPx(0, y).y;
                ctx.lineWidth = (y === 0) ? 2 : 0.5;
                ctx.strokeStyle = (y === 0) ? '#00ff80' : 'rgba(0, 255, 128, 0.3)';
                
                let startX = 0;
                let endX = canvas.width;
                
                if (currentViewMode === 'q3' && y < 0) endX = gridToPx(0, 0).x;

                ctx.beginPath(); ctx.moveTo(startX, py); ctx.lineTo(endX, py); ctx.stroke();
                
                if (y !== 0) {
                    ctx.fillStyle = '#aaa'; ctx.font = '12px Courier New';
                    const xPos = Math.max(0, Math.min(canvas.width, gridToPx(0, 0).x));
                    let textX = xPos - 15;
                    if (xPos <= 20) textX = xPos + 15; 
                    else if (xPos >= canvas.width - 20) textX = xPos - 15;
                    ctx.fillText(y.toString(), textX, py);
                }
            }
            
            // Origin
            if (viewBounds.minX <= 0 && viewBounds.maxX >= 0 && viewBounds.minY <= 0 && viewBounds.maxY >= 0) {
                const origin = gridToPx(0, 0);
                let oX = origin.x - 12;
                let oY = origin.y + 15;
                if (origin.x <= 20) oX = origin.x + 12;
                if (origin.y >= canvas.height - 20) oY = origin.y - 12;
                ctx.fillStyle = '#aaa'; ctx.fillText("0", oX, oY);
            }
        }

        function drawShapes() {
            shapes.forEach(shape => drawShape(shape, false));
            
            // Previews for drawing mode
            if (currentMode === 'point' && pendingPoints.length === 0) {
                drawShape({ type: 'point', pts: [mousePos] }, true);
            } else if (pendingPoints.length > 0) {
                const tempShape = { type: currentMode, pts: [...pendingPoints, mousePos] };
                drawShape(tempShape, true);
            }
        }

        function drawShape(shape, isPreview) {
            if (shape.type === 'equation') {
                const minX = viewBounds.minX - 5;
                const maxX = viewBounds.maxX + 5;
                const y1 = shape.m * (minX + shape.p) + shape.b;
                const y2 = shape.m * (maxX + shape.p) + shape.b;
                const p1 = gridToPx(minX, y1);
                const p2 = gridToPx(maxX, y2);
                
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = (activeEquation === shape && !isPreview) ? '#ffb700' : (isPreview ? 'rgba(0, 191, 255, 0.5)' : '#00bfff');
                ctx.lineWidth = (hoverInfo && hoverInfo.shape === shape) ? 5 : 3;
                ctx.stroke();

                if (!isPreview) {
                    ctx.direction = 'ltr';
                    let text = formatEquation(shape.m, shape.p, shape.b);
                    ctx.font = 'bold 16px Courier New';
                    const textWidth = ctx.measureText(text).width;
                    
                    let midX = (Math.max(viewBounds.minX, -10) + Math.min(viewBounds.maxX, 10)) / 2;
                    let midY = shape.m * (midX + shape.p) + shape.b;
                    const midP = gridToPx(midX, midY);

                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(midP.x - textWidth/2 - 5, midP.y - 25, textWidth + 10, 20);
                    
                    ctx.fillStyle = '#00bfff';
                    ctx.textAlign = 'center';
                    ctx.fillText(text, midP.x, midP.y - 12);
                }
                return; // ישרים לא צריכים טיפול קודקודים
            }

            if (!shape.pts || shape.pts.length === 0) return;

            ctx.lineWidth = 2;
            ctx.strokeStyle = isPreview ? 'rgba(0, 255, 128, 0.5)' : '#00ff80';
            ctx.fillStyle = isPreview ? 'rgba(0, 255, 128, 0.1)' : 'rgba(0, 20, 40, 0.6)';

            ctx.beginPath();
            
            if (shape.type === 'point') {
                const p = gridToPx(shape.pts[0].x, shape.pts[0].y);
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2); 
            }
            else if (shape.type === 'line') {
                const p1 = gridToPx(shape.pts[0].x, shape.pts[0].y);
                ctx.moveTo(p1.x, p1.y);
                if (shape.pts.length > 1) {
                    const p2 = gridToPx(shape.pts[1].x, shape.pts[1].y);
                    ctx.lineTo(p2.x, p2.y);
                }
                ctx.stroke();
            } 
            else if (shape.type === 'rect') {
                if (shape.pts.length > 1) {
                    const px1 = gridToPx(shape.pts[0].x, shape.pts[0].y);
                    const px2 = gridToPx(shape.pts[1].x, shape.pts[1].y);
                    const minX = Math.min(px1.x, px2.x);
                    const minY = Math.min(px1.y, px2.y);
                    const w = Math.abs(px2.x - px1.x);
                    const h = Math.abs(px2.y - px1.y);
                    ctx.fillRect(minX, minY, w, h);
                    ctx.strokeRect(minX, minY, w, h);
                }
            }
            else if (shape.type === 'triangle') {
                const p1 = gridToPx(shape.pts[0].x, shape.pts[0].y);
                ctx.moveTo(p1.x, p1.y);
                for(let i=1; i<shape.pts.length; i++) {
                    const p = gridToPx(shape.pts[i].x, shape.pts[i].y);
                    ctx.lineTo(p.x, p.y);
                }
                if (shape.pts.length === 3) ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            // צביעת הקודקודים והתוויות
            if (!isPreview || shape.type === 'point') {
                let displayPts = shape.pts;
                if (shape.type === 'rect' && shape.pts.length === 2) {
                    const p1 = shape.pts[0]; const p2 = shape.pts[1];
                    displayPts = [
                        {x: p1.x, y: p1.y}, {x: p2.x, y: p1.y},
                        {x: p2.x, y: p2.y}, {x: p1.x, y: p2.y}
                    ];
                }

                displayPts.forEach((pt, idx) => {
                    const px = gridToPx(pt.x, pt.y);
                    
                    if (hoverInfo && hoverInfo.type === 'vertex' && hoverInfo.shape === shape && hoverInfo.vIndex === idx) {
                        ctx.fillStyle = '#fff';
                        ctx.beginPath(); ctx.arc(px.x, px.y, 6, 0, Math.PI * 2); ctx.fill();
                    }

                    ctx.fillStyle = '#ffb700';
                    ctx.beginPath(); ctx.arc(px.x, px.y, 4, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#000'; ctx.stroke();

                    if (!isPreview) {
                        ctx.direction = 'ltr';
                        const text = `(${pt.x}, ${pt.y})`;
                        ctx.font = 'bold 12px Courier New';
                        const textWidth = ctx.measureText(text).width;
                        
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(px.x - textWidth/2 - 4, px.y - 24, textWidth + 8, 16);
                        
                        ctx.fillStyle = '#00ff80';
                        ctx.textAlign = 'center';
                        ctx.fillText(text, px.x, px.y - 16);
                    }
                });
            }
        }

        function render() {
            drawGrid();
            drawShapes();
        }

        // Interaction Logic
        function getEventPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { px: clientX - rect.left, py: clientY - rect.top, clientX, clientY };
        }

        function hitTest(gridPt, exactPt) {
            // בדיקת קודקודים קודם כל (כולל נקודות)
            for (let s of shapes) {
                if (s.type === 'equation') continue;
                let ptsToCheck = s.pts;
                if (s.type === 'rect') {
                    const p1 = s.pts[0], p2 = s.pts[1];
                    ptsToCheck = [ {x: p1.x, y: p1.y}, {x: p2.x, y: p1.y}, {x: p2.x, y: p2.y}, {x: p1.x, y: p2.y} ];
                }
                for (let i = 0; i < ptsToCheck.length; i++) {
                    if (ptsToCheck[i].x === gridPt.x && ptsToCheck[i].y === gridPt.y) return { type: 'vertex', shape: s, vIndex: i };
                }
            }
            
            // בדיקת גוף הצורות או ישרים
            for (let s of shapes) {
                if (s.type === 'equation' && exactPt) {
                    // מרחק נקודה מדויקת מישר
                    const yLine = s.m * (exactPt.x + s.p) + s.b;
                    const dist = Math.abs(exactPt.y - yLine) / Math.sqrt(s.m * s.m + 1);
                    if (dist < 0.8) return { type: 'shape', shape: s };
                }
                else if (s.type === 'rect') {
                    const minX = Math.min(s.pts[0].x, s.pts[1].x);
                    const maxX = Math.max(s.pts[0].x, s.pts[1].x);
                    const minY = Math.min(s.pts[0].y, s.pts[1].y);
                    const maxY = Math.max(s.pts[0].y, s.pts[1].y);
                    if (gridPt.x >= minX && gridPt.x <= maxX && gridPt.y >= minY && gridPt.y <= maxY) return { type: 'shape', shape: s };
                }
                else if (s.type === 'triangle') {
                    const xs = s.pts.map(p => p.x); const ys = s.pts.map(p => p.y);
                    if (gridPt.x >= Math.min(...xs) && gridPt.x <= Math.max(...xs) && 
                        gridPt.y >= Math.min(...ys) && gridPt.y <= Math.max(...ys)) return { type: 'shape', shape: s };
                }
                else if (s.type === 'line') {
                    const p1 = s.pts[0], p2 = s.pts[1];
                    const minX = Math.min(p1.x, p2.x), maxX = Math.max(p1.x, p2.x);
                    const minY = Math.min(p1.y, p2.y), maxY = Math.max(p1.y, p2.y);
                    if (gridPt.x >= minX - 1 && gridPt.x <= maxX + 1 && gridPt.y >= minY - 1 && gridPt.y <= maxY + 1) return { type: 'shape', shape: s };
                }
            }
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0 && !e.touches) return; 
            const { px, py } = getEventPoint(e);
            const gridPt = pxToGrid(px, py);
            const exactPt = pxToGridExact(px, py);

            if (currentMode === 'select') {
                const hit = hitTest(gridPt, exactPt);
                if (hit) {
                    dragInfo = { 
                        ...hit, 
                        startX: gridPt.x, startY: gridPt.y, 
                        startExactX: exactPt.x, startExactY: exactPt.y,
                        origShapePts: hit.shape.pts ? hit.shape.pts.map(p => ({...p})) : null,
                        origShapeP: hit.shape.p !== undefined ? hit.shape.p : null,
                        origShapeB: hit.shape.b !== undefined ? hit.shape.b : null,
                        startPx: px, startPy: py, origBounds: { ...viewBounds }
                    };
                    if (hit.shape && hit.shape.type === 'equation') {
                        activeEquation = hit.shape;
                        document.getElementById('input-m').value = parseFloat(activeEquation.m.toFixed(2));
                        document.getElementById('input-p').value = parseFloat(activeEquation.p.toFixed(2));
                        document.getElementById('input-b').value = parseFloat(activeEquation.b.toFixed(2));
                        onInputsChanged(false);
                    }
                } else {
                    dragInfo = { type: 'pan', startPx: px, startPy: py, origBounds: { ...viewBounds } };
                    canvas.style.cursor = 'grabbing';
                }
            } else {
                pendingPoints.push(gridPt);
                if ((currentMode === 'point' && pendingPoints.length === 1) ||
                    (currentMode === 'line' && pendingPoints.length === 2) ||
                    (currentMode === 'rect' && pendingPoints.length === 2) ||
                    (currentMode === 'triangle' && pendingPoints.length === 3)) {
                    shapes.push({ type: currentMode, pts: [...pendingPoints], id: Date.now() });
                    pendingPoints = [];
                    setMode('select'); 
                }
                render();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const { px, py, clientX, clientY } = getEventPoint(e);
            mousePos = pxToGrid(px, py); 
            const exactPt = pxToGridExact(px, py);

            if (dragInfo) {
                if (dragInfo.type === 'pan') {
                    const dxPx = px - dragInfo.startPx;
                    const dyPx = py - dragInfo.startPy;
                    const w = dragInfo.origBounds.maxX - dragInfo.origBounds.minX;
                    const h = dragInfo.origBounds.maxY - dragInfo.origBounds.minY;
                    const dxGrid = dxPx * (w / canvas.width);
                    const dyGrid = dyPx * (h / canvas.height); 
                    
                    viewBounds.minX = dragInfo.origBounds.minX - dxGrid;
                    viewBounds.maxX = dragInfo.origBounds.maxX - dxGrid;
                    viewBounds.minY = dragInfo.origBounds.minY + dyGrid;
                    viewBounds.maxY = dragInfo.origBounds.maxY + dyGrid;
                    
                    render();
                    return;
                }

                const dx = mousePos.x - dragInfo.startX;
                const dy = mousePos.y - dragInfo.startY;

                if (dragInfo.type === 'shape') {
                    if (dragInfo.shape.type === 'equation') {
                        const exactDx = exactPt.x - dragInfo.startExactX;
                        const exactDy = exactPt.y - dragInfo.startExactY;
                        
                        dragInfo.shape.p = dragInfo.origShapeP - exactDx;
                        dragInfo.shape.b = dragInfo.origShapeB + exactDy;
                        
                        document.getElementById('input-p').value = parseFloat(dragInfo.shape.p.toFixed(2));
                        document.getElementById('input-b').value = parseFloat(dragInfo.shape.b.toFixed(2));
                        onInputsChanged(false);
                    } else if (dragInfo.shape.pts) {
                        for (let i = 0; i < dragInfo.shape.pts.length; i++) {
                            dragInfo.shape.pts[i].x = dragInfo.origShapePts[i].x + dx;
                            dragInfo.shape.pts[i].y = dragInfo.origShapePts[i].y + dy;
                        }
                    }
                } else if (dragInfo.type === 'vertex') {
                    if (dragInfo.shape.type === 'rect') {
                        const idx = dragInfo.vIndex;
                        const p1 = dragInfo.shape.pts[0];
                        const p2 = dragInfo.shape.pts[1];
                        if (idx === 0) { p1.x = mousePos.x; p1.y = mousePos.y; } 
                        else if (idx === 1) { p2.x = mousePos.x; p1.y = mousePos.y; } 
                        else if (idx === 2) { p2.x = mousePos.x; p2.y = mousePos.y; } 
                        else if (idx === 3) { p1.x = mousePos.x; p2.y = mousePos.y; } 
                    } else {
                        dragInfo.shape.pts[dragInfo.vIndex].x = dragInfo.origShapePts[dragInfo.vIndex].x + dx;
                        dragInfo.shape.pts[dragInfo.vIndex].y = dragInfo.origShapePts[dragInfo.vIndex].y + dy;
                    }
                }

                const sidebarRect = sidebar.getBoundingClientRect();
                if (clientX > sidebarRect.left) deleteZone.classList.add('drag-over');
                else deleteZone.classList.remove('drag-over');

            } else if (currentMode === 'select') {
                const prevHover = hoverInfo;
                hoverInfo = hitTest(mousePos, exactPt);
                if (hoverInfo !== prevHover) {
                    if (hoverInfo) {
                        canvas.style.cursor = hoverInfo.type === 'vertex' ? 'move' : 'pointer';
                    } else {
                        canvas.style.cursor = 'grab';
                    }
                }
            }
            render();
        });

        window.addEventListener('mouseup', (e) => {
            if (dragInfo) {
                const clientX = e.touches ? e.changedTouches[0].clientX : e.clientX;
                const sidebarRect = sidebar.getBoundingClientRect();
                
                if (clientX > sidebarRect.left) shapes = shapes.filter(s => s !== dragInfo.shape);
                
                deleteZone.classList.remove('drag-over');
                dragInfo = null;
                render();
            }
        });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', e.touches[0])); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', e.touches[0])); }, {passive: false});
        window.addEventListener('touchend', (e) => { window.dispatchEvent(new MouseEvent('mouseup', e.changedTouches[0])); });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 1.1 : 0.9;
            const { px, py } = getEventPoint(e);
            const exactCenter = pxToGridExact(px, py);
            
            let w = viewBounds.maxX - viewBounds.minX;
            let h = viewBounds.maxY - viewBounds.minY;
            
            let newW = w * zoomFactor;
            let newH = h * zoomFactor;
            
            if (newW > 80) { newW = 80; newH = 80; } 
            if (newW < 2) { newW = 2; newH = 2; } 
            
            const fracX = px / canvas.width;
            const fracY = py / canvas.height;
            
            viewBounds.minX = exactCenter.x - fracX * newW;
            viewBounds.maxX = viewBounds.minX + newW;
            viewBounds.maxY = exactCenter.y + fracY * newH;
            viewBounds.minY = viewBounds.maxY - newH;
            
            render();
        }, { passive: false });

        // אתחול התצוגה של המשוואה
        onInputsChanged(false);
        setView('all');
    </script>
</body>
</html>
