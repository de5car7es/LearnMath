<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפגזת צוללות קרטזית</title>
    <style>
        :root {
            --bg-color: #04111d;
            --grid-color: rgba(0, 255, 128, 0.3);
            --grid-axis: #00ff80;
            --primary: #00ff80;
            --secondary: #1a365d;
            --panel-bg: rgba(0, 20, 30, 0.9);
            --text-color: #e0e0e0;
        }
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden;
        }
        
        #setup-screen, #lobby-screen, #victory-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(4, 17, 29, 0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; text-align: center; border: 5px solid var(--primary); box-sizing: border-box;
        }
        h1 { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .hidden { display: none !important; }
        input, button { 
            padding: 12px 20px; font-size: 18px; border-radius: 4px; border: 2px solid var(--primary); 
            margin: 5px; font-family: 'Courier New', Courier, monospace; font-weight: bold;
        }
        input[type="text"], input[type="number"] { background: #000; color: var(--primary); text-align: center; outline: none; }
        button { cursor: pointer; background-color: var(--secondary); color: var(--primary); transition: all 0.3s; box-shadow: 0 0 5px var(--primary); }
        button:hover { background-color: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        button:disabled { border-color: #555; color: #555; background: #222; cursor: not-allowed; box-shadow: none; }
        .btn-adv { border-color: #f39c12; color: #f39c12; }
        .btn-adv:hover { background-color: #f39c12; color: #000; box-shadow: 0 0 15px #f39c12; }

        #top-bar {
            width: 100%; background: var(--panel-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; box-sizing: border-box; z-index: 20;
        }
        #top-bar-title { font-size: 20px; font-weight: bold; color: var(--primary); }
        #game-status-text { font-size: 18px; font-weight: bold; color: #fff; }
        #timer-display { font-size: 24px; color: #fff; text-shadow: 0 0 8px #fff; }

        #main-container { display: flex; flex-direction: row; width: 100%; flex-grow: 1; position: relative; }
        
        #toolbar { 
            width: 250px; background: var(--panel-bg); border-right: 2px solid var(--primary); 
            padding: 10px; display: flex; flex-direction: column; align-items: center; 
            z-index: 10; overflow-y: auto;
        }
        #toolbar-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .tool-shape { 
            background: rgba(100, 100, 100, 0.5); border: 2px solid #aaa; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 14px; cursor: grab; user-select: none; position: relative;
            box-sizing: border-box;
        }
        .tool-shape.submarine { background: rgba(200, 150, 0, 0.6); border-color: #ffb700; color: #fff; }
        .tool-shape.submarine::after { content: '🚢'; position: absolute; font-size: 14px; top: 2px; right: 2px; }
        
        /* משולשים */
        .triangle { clip-path: var(--clip, polygon(0 0, 100% 0, 0 100%)); border: none !important; }
        .triangle::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; box-shadow: inset 0 0 0 2px #aaa; pointer-events:none; }
        .triangle.submarine::before { box-shadow: inset 0 0 0 2px #ffb700; }
        .placed-shape.triangle::before { box-shadow: inset 0 0 0 2px var(--primary); }
        
        #canvas-wrapper { flex-grow: 1; position: relative; background: var(--bg-color); overflow: hidden; cursor: crosshair; }
        canvas { display: block; }

        .placed-shape { position: absolute; background: rgba(0, 255, 128, 0.2); border: 2px solid var(--primary); box-sizing: border-box; cursor: move; }
        .placed-shape.submarine { background: rgba(255, 183, 0, 0.3); border-color: #ffb700; }
        .placed-shape.game-mode { background: #333; border: 2px dashed #666; cursor: pointer; }
        .placed-shape.game-mode:hover { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .placed-shape.game-mode.revealed-sub { background: rgba(0, 255, 128, 0.6) !important; border: 2px solid var(--primary) !important; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .placed-shape.game-mode.revealed-fail { background: rgba(255, 0, 0, 0.4) !important; border: 2px solid #ff0000 !important; opacity: 0.5; display: flex; align-items: center; justify-content: center; }

        .vertex-label {
            position: absolute; background: var(--primary); color: #000; font-weight: bold;
            font-size: 12px; padding: 2px 5px; border-radius: 3px;
            transform: translate(-50%, -50%); z-index: 50; pointer-events: none;
            box-shadow: 0 0 5px #000;
        }

        #calc-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel-bg); padding: 25px; border-radius: 8px; border: 3px solid var(--primary); 
            box-shadow: 0 0 25px rgba(0,255,128,0.5); z-index: 100; text-align: center;
        }
        #calc-modal h3 { margin-top: 0; color: var(--primary); }

        #code-output-area { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 2px solid var(--primary); 
            display: flex; flex-direction: column; align-items: center; z-index: 50; gap: 10px;
        }
        .code-row { display: flex; align-items: center; }
        #share-code-display { 
            width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            background: #000; padding: 10px; border-radius: 4px; margin-left: 10px; color: var(--primary);
        }

        .missile { position: fixed; font-size: 30px; z-index: 9999; transition: left 0.4s ease-in, top 0.4s ease-in; pointer-events: none; transform-origin: center center; }
        .explosion { position: fixed; font-size: 50px; z-index: 9999; transition: transform 0.2s ease-out, opacity 0.2s ease-out; transform: translate(-50%, -50%) scale(0.1); pointer-events: none; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>הפגזת צוללות</h1>
        <p>מערכת זיהוי קרטזית הופעלה. אנא הזן את שמך:</p>
        <input type="text" id="player-name-input" placeholder="שם הקברניט..." maxlength="15">
        <button onclick="setPlayerName()">התחבר למערכת</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h1>שלום קברניט <span id="display-name"></span></h1>
        
        <div style="display:flex; gap: 30px; margin-top: 20px;">
            <div style="display:flex; flex-direction:column; align-items:center; background:rgba(0,255,128,0.1); padding:20px; border:1px solid var(--primary); border-radius:8px;">
                <h3 style="color:var(--primary); margin-top:0;">מערך מלבנים (בסיסי)</h3>
                <button onclick="startComputerMode('rect')">🤖 נגד המחשב (מלבנים)</button>
                <button onclick="startCreationMode('rect')">🔧 יצירת לוח מלבנים לחבר</button>
            </div>
            
            <div style="display:flex; flex-direction:column; align-items:center; background:rgba(243, 156, 18, 0.1); padding:20px; border:1px solid #f39c12; border-radius:8px;">
                <h3 style="color:#f39c12; margin-top:0;">מערך משולשים (מתקדם)</h3>
                <button class="btn-adv" onclick="startComputerMode('triangle')">🤖 נגד המחשב (משולשים)</button>
                <button class="btn-adv" onclick="startCreationMode('triangle')">📐 יצירת לוח משולשים לחבר</button>
            </div>
        </div>

        <div style="margin-top: 30px; background:var(--panel-bg); padding:20px; border:1px solid #fff; border-radius:8px;">
            <p style="margin-top:0; font-weight:bold;">🎮 מתקפה נגד חבר (הזן קוד)</p>
            <input type="text" id="join-code-input" placeholder="הדבק כאן קוד... (מלבן/משולש)">
            <button style="border-color:#fff; color:#fff;" onclick="startAreaMode()">התחל מתקפה</button>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 style="font-size: 48px; color: #00ff80;">המשימה הושלמה!</h1>
        <p id="victory-message" style="font-size: 24px;"></p>
        <p id="victory-time" style="font-size: 20px;"></p>
        <button onclick="resetToLobby()">חזור לבסיס (תפריט ראשי)</button>
    </div>

    <div id="top-bar" class="hidden">
        <div id="top-bar-title">הפגזת צוללות</div>
        <div id="game-status-text"></div>
        <div id="timer-display">00:00</div>
    </div>

    <div id="main-container" class="hidden">
        <div id="toolbar" class="hidden">
            <h3 style="color:var(--primary); margin-top:0;">מחסן כלים</h3>
            <p style="font-size:12px; text-align:center;">גרור את המטרות אל הרדאר:</p>
            <div id="toolbar-items"></div>
            <button id="finish-creation-btn" style="margin-top:auto;" onclick="finishCreation()" disabled>אשר פריסה</button>
            <button style="margin-top:10px; background:transparent; border-color:#e74c3c; color:#e74c3c;" onclick="resetToLobby()">ביטול וחזרה</button>
        </div>

        <div id="canvas-wrapper">
            <canvas id="gridCanvas"></canvas>
            <div id="placed-shapes-layer"></div>
        </div>

        <div id="calc-modal">
            <h3>זיהוי מטרה</h3>
            <canvas id="modal-canvas" width="280" height="180" style="background:#000; border:1px solid #00ff80; margin-bottom:15px; border-radius:4px;"></canvas>
            
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
                <input type="number" id="input-perimeter" placeholder="היקף P" style="width:100px;">
                <input type="number" id="input-area" placeholder="שטח S" style="width:100px;">
            </div>
            <button onclick="checkGameAnswer()">שגר טיל!</button>
            <button style="background:#555; color:#fff; border-color:#777;" onclick="closeCalcModal()">בטל</button>
        </div>

        <div id="code-output-area" class="hidden">
            <div class="code-row">
                <span>קוד רשת מוצפן:</span>
                <div id="share-code-display"></div>
                <button onclick="copyShareCode()">העתק קוד</button>
            </div>
            <button style="background:transparent; border-color:#e74c3c; color:#e74c3c; padding: 5px 15px;" onclick="resetToLobby()">חזור לתפריט הראשי</button>
        </div>
    </div>

    <script>
        const GRID_MIN = -20;
        const GRID_MAX = 20;
        const GRID_SIZE = GRID_MAX - GRID_MIN;
        let cellSize;

        let playerName = "";
        let creatorName = "";
        let currentGameMode = null; 
        let currentShapeType = 'rect'; 
        let placedShapes = [];
        let activeSubmarinesCount = 0;
        let foundSubmarinesCount = 0;
        
        let timerInterval;
        let startTime;

        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const shapesLayer = document.getElementById('placed-shapes-layer');
        const calcModal = document.getElementById('calc-modal');

        window.addEventListener('resize', initGameLayout);

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                
                if (type === 'success') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'pop') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                }
            } catch(e) {}
        }

        function setPlayerName() {
            playerName = document.getElementById('player-name-input').value.trim();
            if (!playerName) { alert("הזן שם קברניט!"); return; }
            document.getElementById('display-name').innerText = playerName;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        }

        function resetToLobby() {
            stopTimer();
            placedShapes = [];
            shapesLayer.innerHTML = '';
            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('top-bar').classList.add('hidden');
            document.getElementById('code-output-area').classList.add('hidden');
            document.getElementById('victory-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            closeCalcModal();
        }

        function initGameLayout() {
            const wrapper = document.getElementById('canvas-wrapper');
            const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
            canvas.width = size;
            canvas.height = size;
            cellSize = size / GRID_SIZE;
            drawGrid();
            renderPlacedShapes();
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const center = canvas.width / 2;
            
            for (let i = 0; i <= GRID_SIZE; i++) {
                const pos = i * cellSize;
                ctx.lineWidth = (i === GRID_SIZE / 2) ? 2 : 0.5;
                ctx.strokeStyle = (i === GRID_SIZE / 2) ? '#00ff80' : 'rgba(0, 255, 128, 0.3)';
                
                ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos); ctx.stroke();

                if (i !== GRID_SIZE / 2) {
                    ctx.fillStyle = '#aaa'; 
                    ctx.font = '9px Courier New'; 
                    ctx.textAlign = 'center'; 
                    ctx.textBaseline = 'middle';
                    const val = GRID_MIN + i;
                    ctx.fillText(val, pos, center + 12);
                    ctx.fillText(-val, center - 12, pos);
                }
            }
            ctx.fillText("0", center - 10, center + 10);
        }

        function gridToPx(gridX, gridY) { return { x: (gridX - GRID_MIN) * cellSize, y: (GRID_MAX - gridY) * cellSize }; }
        function pxToGrid(pxX, pxY) { return { x: Math.round(pxX / cellSize) + GRID_MIN, y: GRID_MAX - Math.round(pxY / cellSize) }; }

        function generateRandomTools() {
            const container = document.getElementById('toolbar-items');
            container.innerHTML = '';
            
            // שלשות פיתגוריות נוחות
            const triangleSizes = [{w:6,h:8}, {w:8,h:6}, {w:5,h:12}, {w:12,h:5}, {w:9,h:12}, {w:12,h:9}];

            for(let i=0; i<6; i++) {
                let w, h;
                let ori = 0;
                if (currentShapeType === 'triangle') {
                    const sz = triangleSizes[Math.floor(Math.random() * triangleSizes.length)];
                    w = sz.w; h = sz.h;
                    ori = Math.floor(Math.random() * 4); // 0 עד 3
                } else {
                    w = Math.floor(Math.random() * 9) + 2;
                    h = Math.floor(Math.random() * 9) + 2;
                }
                
                let isSub = i < 2; 
                
                let div = document.createElement('div');
                div.id = 'tool-' + i; 
                div.className = 'tool-shape' + (isSub ? ' submarine' : '') + (currentShapeType === 'triangle' ? ' triangle' : '');
                div.dataset.w = w; div.dataset.h = h; div.dataset.ori = ori;
                
                let scale = 10;
                div.style.width = (w * scale) + 'px';
                div.style.height = (h * scale) + 'px';
                
                if (currentShapeType === 'triangle') {
                    let clipPath = '';
                    if (ori === 0) clipPath = 'polygon(0 0, 100% 0, 0 100%)';
                    else if (ori === 1) clipPath = 'polygon(0 0, 100% 0, 100% 100%)';
                    else if (ori === 2) clipPath = 'polygon(100% 0, 100% 100%, 0 100%)';
                    else if (ori === 3) clipPath = 'polygon(0 0, 100% 100%, 0 100%)';
                    div.style.setProperty('--clip', clipPath);
                } else {
                    div.innerText = `${w}x${h}`;
                }
                
                div.addEventListener('mousedown', startDragFromToolbar);
                div.addEventListener('touchstart', startDragFromToolbar, {passive: false});
                container.appendChild(div);
            }
        }

        function generateComputerBoard() {
            let shapes = [];
            let attempts = 0;
            const triangleSizes = [{w:6,h:8}, {w:8,h:6}, {w:5,h:12}, {w:12,h:5}, {w:9,h:12}, {w:12,h:9}];
            
            while (shapes.length < 6 && attempts < 1000) {
                attempts++;
                let isSub = shapes.length < 2;
                let w, h, ori = 0;
                if (currentShapeType === 'triangle') {
                    const sz = triangleSizes[Math.floor(Math.random() * triangleSizes.length)];
                    w = sz.w; h = sz.h;
                    ori = Math.floor(Math.random() * 4);
                } else {
                    w = Math.floor(Math.random() * 9) + 2; h = Math.floor(Math.random() * 9) + 2;
                }
                
                let x = Math.floor(Math.random() * (GRID_SIZE - w + 1)) + GRID_MIN;
                let y = Math.floor(Math.random() * (GRID_SIZE - h + 1)) + GRID_MIN + h;
                
                let overlap = false;
                for (let r of shapes) {
                    if (!(x + w <= r.x || x >= r.x + r.w || y - h >= r.y || y <= r.y - r.h)) { overlap = true; break; }
                }
                
                if (!overlap) { shapes.push({ id: Date.now() + Math.random(), x, y, w, h, ori, isSub, type: currentShapeType }); }
            }
            return shapes;
        }

        function startComputerMode(type) {
            currentShapeType = type;
            creatorName = "המחשב";
            placedShapes = generateComputerBoard();
            
            currentGameMode = 'play';
            foundSubmarinesCount = 0;
            activeSubmarinesCount = 2;

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('toolbar').classList.add('hidden');
            
            document.getElementById('game-status-text').innerText = `${playerName} נגד ${creatorName}`;
            
            setTimeout(() => { initGameLayout(); startTimer(); }, 50);
        }

        function startCreationMode(type) {
            currentShapeType = type;
            currentGameMode = 'create';
            placedShapes = [];
            generateRandomTools();
            
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('toolbar').classList.remove('hidden');
            document.getElementById('code-output-area').classList.add('hidden');
            
            document.getElementById('game-status-text').innerText = "מצב יצירה: מקם את המטרות על הרדאר";
            document.getElementById('timer-display').innerText = "00:00";
            
            setTimeout(initGameLayout, 50);
        }

        let dragShapeInfo = null;

        function startDragFromToolbar(e) {
            e.preventDefault();
            const el = e.currentTarget;
            const touch = e.touches ? e.touches[0] : e;
            
            dragShapeInfo = {
                w: parseInt(el.dataset.w), h: parseInt(el.dataset.h),
                ori: parseInt(el.dataset.ori || 0),
                isSub: el.classList.contains('submarine'), isNew: true,
                sourceId: el.id, type: currentShapeType,
                offsetX: (parseInt(el.style.width) / 2), offsetY: (parseInt(el.style.height) / 2)
            };

            const ghost = el.cloneNode(true);
            ghost.style.position = 'absolute'; ghost.style.opacity = '0.7'; ghost.style.pointerEvents = 'none'; ghost.id = 'drag-ghost';
            if(currentShapeType === 'triangle') ghost.innerText = ''; 
            document.body.appendChild(ghost);
            moveDragGhost(touch.clientX, touch.clientY);

            document.addEventListener('mousemove', dragMove); document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) { e.preventDefault(); const touch = e.touches ? e.touches[0] : e; moveDragGhost(touch.clientX, touch.clientY); }
        function moveDragGhost(x, y) { const ghost = document.getElementById('drag-ghost'); if (ghost) { ghost.style.left = (x - dragShapeInfo.offsetX) + 'px'; ghost.style.top = (y - dragShapeInfo.offsetY) + 'px'; } }

        function dragEnd(e) {
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const ghost = document.getElementById('drag-ghost');
            const wrapper = document.getElementById('canvas-wrapper');
            const rectCanvas = wrapper.getBoundingClientRect();
            
            if (touch.clientX >= rectCanvas.left && touch.clientX <= rectCanvas.right && touch.clientY >= rectCanvas.top && touch.clientY <= rectCanvas.bottom) {
                const mouseX = touch.clientX - rectCanvas.left;
                const mouseY = touch.clientY - rectCanvas.top;
                let scaleDiffX = (dragShapeInfo.w * cellSize) / 2;
                let scaleDiffY = (dragShapeInfo.h * cellSize) / 2;
                
                const gridPos = pxToGrid(mouseX - scaleDiffX, mouseY - scaleDiffY);
                addOrUpdatePlacedShape(gridPos.x, gridPos.y, dragShapeInfo);
                
                if (dragShapeInfo.isNew) {
                    const sourceEl = document.getElementById(dragShapeInfo.sourceId);
                    if (sourceEl) sourceEl.style.display = 'none';
                }
            } else if (!dragShapeInfo.isNew) {
                const sourceEl = document.getElementById(dragShapeInfo.sourceId);
                if (sourceEl) sourceEl.style.display = 'flex';
                placedShapes = placedShapes.filter(r => r.id !== dragShapeInfo.id);
                renderPlacedShapes();
            }

            if (ghost) ghost.remove();
            dragShapeInfo = null;
            document.removeEventListener('mousemove', dragMove); document.removeEventListener('touchmove', dragMove);
            document.removeEventListener('mouseup', dragEnd); document.removeEventListener('touchend', dragEnd);
        }

        function addOrUpdatePlacedShape(gridX, gridY, info) {
            let x = Math.max(GRID_MIN, Math.min(GRID_MAX - info.w, gridX));
            let y = Math.max(GRID_MIN + info.h, Math.min(GRID_MAX, gridY));
            if (info.isNew) { 
                placedShapes.push({ id: Date.now() + Math.random(), x, y, w: info.w, h: info.h, ori: info.ori, isSub: info.isSub, type: info.type, sourceId: info.sourceId }); 
            } else { 
                const shape = placedShapes.find(r => r.id === info.id); 
                if (shape) { shape.x = x; shape.y = y; } 
            }
            renderPlacedShapes();
        }

        function getShapeVertices(shape) {
            if (shape.type === 'rect') {
                return [ { x: shape.x, y: shape.y }, { x: shape.x + shape.w, y: shape.y }, { x: shape.x + shape.w, y: shape.y - shape.h }, { x: shape.x, y: shape.y - shape.h } ];
            } else {
                if(shape.ori===0) return [{x: shape.x, y: shape.y}, {x: shape.x+shape.w, y: shape.y}, {x: shape.x, y: shape.y-shape.h}];
                if(shape.ori===1) return [{x: shape.x, y: shape.y}, {x: shape.x+shape.w, y: shape.y}, {x: shape.x+shape.w, y: shape.y-shape.h}];
                if(shape.ori===2) return [{x: shape.x+shape.w, y: shape.y}, {x: shape.x+shape.w, y: shape.y-shape.h}, {x: shape.x, y: shape.y-shape.h}];
                if(shape.ori===3) return [{x: shape.x, y: shape.y}, {x: shape.x+shape.w, y: shape.y-shape.h}, {x: shape.x, y: shape.y-shape.h}];
            }
        }

        function renderPlacedShapes() {
            shapesLayer.innerHTML = ''; 
            
            placedShapes.forEach(shape => {
                const pos = gridToPx(shape.x, shape.y);
                const el = document.createElement('div');
                el.className = 'placed-shape ' + (shape.isSub ? 'submarine' : '') + (shape.type === 'triangle' ? ' triangle' : '');
                if (currentGameMode === 'play') el.className += ' game-mode';
                
                el.style.width = (shape.w * cellSize) + 'px';
                el.style.height = (shape.h * cellSize) + 'px';
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';

                if (shape.type === 'triangle') {
                    let clipPath = '';
                    if (shape.ori === 0) clipPath = 'polygon(0 0, 100% 0, 0 100%)';
                    else if (shape.ori === 1) clipPath = 'polygon(0 0, 100% 0, 100% 100%)';
                    else if (shape.ori === 2) clipPath = 'polygon(100% 0, 100% 100%, 0 100%)';
                    else if (shape.ori === 3) clipPath = 'polygon(0 0, 100% 100%, 0 100%)';
                    el.style.setProperty('--clip', clipPath);
                }

                if (currentGameMode === 'create') {
                    el.addEventListener('mousedown', (e) => startDragExisting(e, shape));
                    el.addEventListener('touchstart', (e) => startDragExisting(e, shape), {passive: false});
                    
                    const coords = getShapeVertices(shape);
                    coords.forEach(c => {
                        const px = gridToPx(c.x, c.y);
                        const label = document.createElement('div');
                        label.className = 'vertex-label'; label.innerText = `(${c.x},${c.y})`;
                        label.style.left = px.x + 'px'; label.style.top = px.y + 'px';
                        shapesLayer.appendChild(label);
                    });

                } else if (currentGameMode === 'play') {
                    el.onclick = () => openCalcModal(shape, el);
                }
                shapesLayer.appendChild(el);
            });

            if (currentGameMode === 'create') {
                const btn = document.getElementById('finish-creation-btn');
                const subsPlaced = placedShapes.filter(r => r.isSub).length;
                const decoysPlaced = placedShapes.filter(r => !r.isSub).length;
                
                if (subsPlaced < 2) {
                    btn.disabled = true; btn.innerText = `הנח עוד ${2 - subsPlaced} צוללות`;
                } else if (decoysPlaced < 4) {
                    btn.disabled = true; btn.innerText = `הנח עוד ${4 - decoysPlaced} הטעיות`;
                } else {
                    btn.disabled = false; btn.innerText = "אשר פריסה";
                }
            }
        }

        function startDragExisting(e, shape) {
            e.preventDefault(); e.stopPropagation();
            const touch = e.touches ? e.touches[0] : e;
            const el = e.currentTarget; const rectBound = el.getBoundingClientRect();
            dragShapeInfo = { ...shape, isNew: false, offsetX: touch.clientX - rectBound.left, offsetY: touch.clientY - rectBound.top };
            const ghost = el.cloneNode(true); ghost.id = 'drag-ghost'; ghost.style.position = 'fixed'; ghost.style.opacity = '0.5'; ghost.style.pointerEvents = 'none'; ghost.style.zIndex = '1000';
            document.body.appendChild(ghost);
            moveDragGhost(touch.clientX, touch.clientY);
            document.addEventListener('mousemove', dragMove); document.addEventListener('touchmove', dragMove, {passive: false});
            document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);
        }

        function encrypt(text) { return text.split('').map(char => String.fromCharCode(char.charCodeAt(0) + 1)).join(''); }
        function decrypt(cipher) { return cipher.split('').map(char => String.fromCharCode(char.charCodeAt(0) - 1)).join(''); }

        function finishCreation() {
            if (placedShapes.length < 6) return;
            
            const exportData = placedShapes.map(s => {
                if (s.type === 'triangle') {
                    // המרה למערך 3 נקודות חכם שמגדיר את הצורה והכיוון במדויק מבלי להוסיף שדות
                    const pts = getShapeVertices(s).map(p => [p.x, p.y]);
                    return { p: pts, isSub: s.isSub };
                } else {
                    return { x: s.x, y: s.y, w: s.w, h: s.h, isSub: s.isSub };
                }
            });

            const data = { n: playerName, r: exportData };
            const code = encrypt(JSON.stringify(data));
            document.getElementById('toolbar').classList.add('hidden');
            document.getElementById('code-output-area').classList.remove('hidden');
            document.getElementById('share-code-display').innerText = code;
        }

        function copyShareCode() {
            const code = document.getElementById('share-code-display').innerText;
            navigator.clipboard.writeText(code).then(() => alert("קוד הועתק! העבר אותו ליריב."));
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = String(Math.floor(diff / 60)).padStart(2, '0');
                let s = String(diff % 60).padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }

        let gameModalState = { shape: null, el: null };

        function startAreaMode() {
            const codeInput = document.getElementById('join-code-input').value.trim();
            if (!codeInput) { alert("הכנס קוד יריב!"); return; }
            
            try {
                const data = JSON.parse(decrypt(codeInput));
                creatorName = data.n; 
                
                placedShapes = data.r.map(item => {
                    if (item.p && item.p.length === 3) {
                        let xs = item.p.map(pt => pt[0]);
                        let ys = item.p.map(pt => pt[1]);
                        let minX = Math.min(...xs), maxX = Math.max(...xs);
                        let minY = Math.min(...ys), maxY = Math.max(...ys);
                        let x = minX, w = maxX - minX;
                        let y = maxY, h = maxY - minY; 

                        // פיענוח חכם של הכיוון (אוריאנטציה) לפי הקודקוד ש"חסר" מהמלבן החוסם
                        let hasTL = item.p.some(pt => pt[0]===minX && pt[1]===maxY);
                        let hasTR = item.p.some(pt => pt[0]===maxX && pt[1]===maxY);
                        let hasBR = item.p.some(pt => pt[0]===maxX && pt[1]===minY);
                        let hasBL = item.p.some(pt => pt[0]===minX && pt[1]===minY);

                        let ori = 0;
                        if (!hasBR) ori = 0;
                        else if (!hasBL) ori = 1;
                        else if (!hasTL) ori = 2;
                        else if (!hasTR) ori = 3;

                        return { id: Math.random(), x, y, w, h, ori, isSub: item.isSub, type: 'triangle' };
                    } else {
                        return { id: Math.random(), x: item.x, y: item.y, w: item.w, h: item.h, isSub: item.isSub, type: 'rect' };
                    }
                });
                if (!Array.isArray(placedShapes) || placedShapes.length === 0) throw "Error";
                currentShapeType = placedShapes[0].type; 
            } catch (e) { alert("קוד פגום, נסה שנית."); return; }

            currentGameMode = 'play';
            foundSubmarinesCount = 0;
            activeSubmarinesCount = placedShapes.filter(r => r.isSub).length;

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('toolbar').classList.add('hidden');
            document.getElementById('code-output-area').classList.add('hidden');
            
            document.getElementById('game-status-text').innerText = `${playerName} נגד ${creatorName}`;
            
            setTimeout(() => { initGameLayout(); startTimer(); }, 50);
        }

        function openCalcModal(shape, el) {
            if (el.classList.contains('revealed-sub') || el.classList.contains('revealed-fail')) return; 
            gameModalState = { shape, el };
            
            drawMiniCanvas(shape);
            
            // במשולש, מסתירים את ההיקף
            if (shape.type === 'triangle') {
                document.getElementById('input-perimeter').style.display = 'none';
                document.getElementById('input-perimeter').value = '0'; // ערך סרק שלא יפריע
            } else {
                document.getElementById('input-perimeter').style.display = 'inline-block';
                document.getElementById('input-perimeter').value = ''; 
            }
            
            document.getElementById('input-area').value = '';
            
            calcModal.style.display = 'block';
            if (shape.type !== 'triangle') document.getElementById('input-perimeter').focus();
            else document.getElementById('input-area').focus();
        }

        function drawMiniCanvas(shape) {
            const mCanvas = document.getElementById('modal-canvas');
            const mCtx = mCanvas.getContext('2d');
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            
            const pad = 60; // שוליים גדולים כדי לרווח את הטקסט
            const drawW = mCanvas.width - pad * 2;
            const drawH = mCanvas.height - pad * 2;
            
            const scale = Math.min(drawW / shape.w, drawH / shape.h);
            const sw = shape.w * scale;
            const sh = shape.h * scale;
            
            const cx = (mCanvas.width - sw) / 2;
            const cy = (mCanvas.height - sh) / 2;
            
            // ציור הצורה עצמה
            mCtx.fillStyle = 'rgba(100,100,100,0.5)';
            mCtx.strokeStyle = '#00ff80';
            mCtx.lineWidth = 2;
            
            mCtx.beginPath();
            if (shape.type === 'rect') {
                mCtx.moveTo(cx, cy); mCtx.lineTo(cx + sw, cy); mCtx.lineTo(cx + sw, cy + sh); mCtx.lineTo(cx, cy + sh);
            } else {
                if (shape.ori === 0) { mCtx.moveTo(cx, cy); mCtx.lineTo(cx + sw, cy); mCtx.lineTo(cx, cy + sh); }
                else if (shape.ori === 1) { mCtx.moveTo(cx, cy); mCtx.lineTo(cx + sw, cy); mCtx.lineTo(cx + sw, cy + sh); }
                else if (shape.ori === 2) { mCtx.moveTo(cx + sw, cy); mCtx.lineTo(cx + sw, cy + sh); mCtx.lineTo(cx, cy + sh); }
                else if (shape.ori === 3) { mCtx.moveTo(cx, cy); mCtx.lineTo(cx + sw, cy + sh); mCtx.lineTo(cx, cy + sh); }
            }
            mCtx.closePath();
            mCtx.fill();
            mCtx.stroke();
            
            // כתיבת הקואורדינטות עם ריווח חכם החוצה
            mCtx.fillStyle = '#fff';
            mCtx.font = 'bold 13px Courier New';
            mCtx.textAlign = 'center';
            mCtx.textBaseline = 'middle';
            
            const pts = getShapeVertices(shape);
            pts.forEach(p => {
                let px = (p.x === shape.x) ? cx : cx + sw;
                let py = (p.y === shape.y) ? cy : cy + sh;
                
                // דחיפת הטקסט החוצה בהתאם למיקום הקודקוד
                let offsetX = (p.x === shape.x) ? -25 : 25; 
                let offsetY = (p.y === shape.y) ? -15 : 15; 
                
                mCtx.fillText(`(${p.x},${p.y})`, px + offsetX, py + offsetY);
            });
        }

        function closeCalcModal() { calcModal.style.display = 'none'; }

        function checkGameAnswer() {
            const shape = gameModalState.shape;
            const el = gameModalState.el;
            
            let trueP, trueS;
            if (shape.type === 'triangle') {
                trueS = (shape.w * shape.h) / 2;
                trueP = 0; // לא בודקים
            } else {
                trueS = shape.w * shape.h;
                trueP = 2 * (shape.w + shape.h);
            }
            
            const userP = parseInt(document.getElementById('input-perimeter').value);
            const userS = parseInt(document.getElementById('input-area').value);

            let isCorrect = false;
            if (userS === 666 && (shape.type === 'triangle' || userP === 666)) {
                isCorrect = true; // צ'יט
            } else if (shape.type === 'triangle') {
                isCorrect = (userS === trueS);
            } else {
                isCorrect = (userP === trueP && userS === trueS);
            }

            if (isCorrect) {
                closeCalcModal();
                fireMissileBarrage(shape, el); 
            } else {
                playSound('fail');
                alert("חישוב שגוי, הקברניט ממתין לנתונים מדויקים!");
            }
        }

        function fireMissileBarrage(shape, el) {
            const numMissiles = Math.floor(Math.random() * 16) + 5; // הגרלת 5 עד 20 טילים
            let hitCount = 0;
            
            for (let i = 0; i < numMissiles; i++) {
                // מרווחים את השיגורים על פני כחצי שנייה
                setTimeout(() => {
                    launchSingleMissile(shape, el, () => {
                        hitCount++;
                        if (hitCount === numMissiles) {
                            revealTarget(shape, el);
                        }
                    });
                }, Math.random() * 500);
            }
        }

        function launchSingleMissile(shape, el, onHitCallback) {
            const rectBound = el.getBoundingClientRect();
            
            // חישוב המרכז של הצורה עם סטייה קלה למראה של פיזור מטח
            const targetX = rectBound.left + rectBound.width / 2 + (Math.random() * 30 - 15);
            const targetY = rectBound.top + rectBound.height / 2 + (Math.random() * 30 - 15);

            let startX, startY;
            const edge = Math.floor(Math.random() * 4);
            if (edge === 0) { startX = Math.random() * window.innerWidth; startY = -100; } 
            else if (edge === 1) { startX = window.innerWidth + 100; startY = Math.random() * window.innerHeight; } 
            else if (edge === 2) { startX = Math.random() * window.innerWidth; startY = window.innerHeight + 100; } 
            else { startX = -100; startY = Math.random() * window.innerHeight; } 

            const missile = document.createElement('div');
            missile.className = 'missile';
            missile.innerText = '🚀';
            missile.style.left = startX + 'px';
            missile.style.top = startY + 'px';

            const angle = Math.atan2(targetY - startY, targetX - startX) * (180 / Math.PI);
            missile.style.transform = `translate(-50%, -50%) rotate(${angle + 45}deg)`;

            document.body.appendChild(missile);

            setTimeout(() => {
                missile.style.left = targetX + 'px';
                missile.style.top = targetY + 'px';
            }, 50);

            setTimeout(() => {
                missile.remove();
                createExplosion(targetX, targetY);
                playSound('pop'); // צליל פיצוץ קטן לכל טיל
                onHitCallback();
            }, 450); // זמן תעופה מהיר יותר
        }

        function createExplosion(x, y) {
            const explosion = document.createElement('div');
            explosion.className = 'explosion';
            explosion.innerText = '💥';
            explosion.style.left = x + 'px';
            explosion.style.top = y + 'px';
            document.body.appendChild(explosion);

            setTimeout(() => { 
                explosion.style.transform = 'translate(-50%, -50%) scale(1.5)'; 
                explosion.style.opacity = '0'; 
            }, 50);
            
            setTimeout(() => explosion.remove(), 250);
        }

        function revealTarget(shape, el) {
            if (shape.isSub) {
                playSound('success');
                el.classList.add('revealed-sub'); el.innerHTML = '🚢';
                foundSubmarinesCount++;
                checkWinCondition();
            } else {
                playSound('fail');
                el.classList.add('revealed-fail'); el.innerHTML = '❌';
            }
        }

        function checkWinCondition() {
            if (foundSubmarinesCount === activeSubmarinesCount) {
                stopTimer();
                const finalTime = document.getElementById('timer-display').innerText;
                setTimeout(() => {
                    document.getElementById('victory-message').innerText = `${playerName} פגע בכל המטרות של ${creatorName}!`;
                    document.getElementById('victory-time').innerText = `זמן ביצוע: ${finalTime}`;
                    document.getElementById('victory-screen').classList.remove('hidden');
                }, 500);
            }
        }

    </script>
</body>
